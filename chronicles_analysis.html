// ── Diff engine ───────────────────────────────────────────────────────
function stripNiqqud(s){ return s.replace(/[\u0591-\u05C7]/g,''); }
const NORM_MAP = {'דויד':'דוד','ירושלים':'ירושלם'};
function norm(w){
  const str = typeof w==='object'?w.word:w;
  const s = stripNiqqud(str).replace(/[׃׀:.,;()\[\]״׳"'!?]+/g,'').trim();
  return NORM_MAP[s]||s;
}
// tokenize returns [{raw, clean, isVerse}]
// raw  = original token (e.g. "(א)")
// clean = stripped of punctuation (e.g. "א" or "ישראל")
// isVerse = true only for tokens like (א) (יב) — paren-wrapped 1-4 Hebrew letters
function tokenize(t){
  if(!t) return [];
  return t.trim().split(/[\s\n\r]+/).map(raw=>{
    const isVerse = /^\([\u05D0-\u05EA]{1,4}\)$/.test(raw.trim());
    const clean   = raw.replace(/^[׃:,.;()\[\]״׳"'!?]+|[׃:,.;()\[\]״׳"'!?]+$/g,'');
    return {raw, clean, isVerse};
  }).filter(t=>t.raw.length>0);
}

// ── LCS diff ─────────────────────────────────────────────────────────
// Deterministic ID based on position — so IDs survive re-renders
function mkId(i){ return 'chunk_'+i; }

function lcs(a,b){
  // a,b are arrays of non-verse token objects
  const m=a.length,n=b.length;
  const dp=[];
  for(let i=0;i<=m;i++){dp[i]=new Array(n+1).fill(0);}
  for(let i=1;i<=m;i++)
    for(let j=1;j<=n;j++)
      dp[i][j]=norm(a[i-1].clean)===norm(b[j-1].clean)
        ?dp[i-1][j-1]+1
        :Math.max(dp[i-1][j],dp[i][j-1]);
  const r=[];let i=m,j=n;
  while(i>0||j>0){
    if(i>0&&j>0&&norm(a[i-1].clean)===norm(b[j-1].clean)){r.unshift({t:'eq',a:a[i-1].raw,b:b[j-1].raw});i--;j--;}
    else if(j>0&&(i===0||dp[i][j-1]>=dp[i-1][j])){r.unshift({t:'om',b:b[j-1].raw});j--;}
    else{r.unshift({t:'ad',a:a[i-1].raw});i--;}
  }
  return r;
}

function buildChunks(raw){
  const res=[];let i=0,pos=0;
  while(i<raw.length){
    const c=raw[i];
    if(c.t==='ad'&&raw[i+1]&&raw[i+1].t==='om'){
      res.push({id:mkId(pos++),type:'changed',aW:[c.a],bW:[raw[i+1].b]});i+=2;
    } else if(c.t==='om'&&raw[i+1]&&raw[i+1].t==='ad'){
      res.push({id:mkId(pos++),type:'changed',aW:[raw[i+1].a],bW:[c.b]});i+=2;
    } else if(c.t==='ad'){
      res.push({id:mkId(pos++),type:'added',aW:[c.a],bW:[]});i++;
    } else if(c.t==='om'){
      res.push({id:mkId(pos++),type:'omitted',aW:[],bW:[c.b]});i++;
    } else {
      res.push({id:mkId(pos++),type:'equal',aW:[c.a],bW:[c.b]});i++;
    }
  }
  return res;
}

// Split text into verse segments: [{label, tokens}]
function splitToVerses(allTokens){
  const segs=[];let cur={label:'',tokens:[]};
  allTokens.forEach(t=>{
    if(t.isVerse){if(cur.tokens.length||cur.label)segs.push(cur);cur={label:t.raw,tokens:[]};}
    else{cur.tokens.push(t);}
  });
  if(cur.tokens.length||cur.label)segs.push(cur);
  return segs;
}
function verseSim(tokensA,tokensB){
  if(!tokensA.length&&!tokensB.length)return 1;
  if(!tokensA.length||!tokensB.length)return 0;
  const setA=new Set(tokensA.map(t=>norm(t.clean)).filter(w=>w.length>1));
  const setB=new Set(tokensB.map(t=>norm(t.clean)).filter(w=>w.length>1));
  if(!setA.size&&!setB.size)return 1;
  if(!setA.size||!setB.size)return 0;
  let common=0;setA.forEach(w=>{if(setB.has(w))common++;});
  return common/Math.max(setA.size,setB.size);
}
function matchVerses(versesA,versesB,threshold=0.25){
  const m=versesA.length,n=versesB.length;
  const sim=Array.from({length:m},(_,i)=>Array.from({length:n},(_,j)=>verseSim(versesA[i].tokens,versesB[j].tokens)));
  const dp=Array.from({length:m+1},()=>new Array(n+1).fill(0));
  for(let i=1;i<=m;i++)for(let j=1;j<=n;j++)
    dp[i][j]=sim[i-1][j-1]>=threshold?dp[i-1][j-1]+1:Math.max(dp[i-1][j],dp[i][j-1]);
  const pairs=[];let i=m,j=n;
  while(i>0&&j>0){
    if(sim[i-1][j-1]>=threshold&&dp[i][j]===dp[i-1][j-1]+1){pairs.unshift({aIdx:i-1,bIdx:j-1});i--;j--;}
    else if(dp[i-1][j]>=dp[i][j-1])i--;else j--;
  }
  return pairs;
}
function computeDiff(tA,tB){
  try{
    const allA=tokenize(tA),allB=tokenize(tB);
    if(!allA.length&&!allB.length)return[];
    const versesA=splitToVerses(allA),versesB=splitToVerses(allB);
    const pairs=matchVerses(versesA,versesB);
    const matchedB=new Set(pairs.map(p=>p.bIdx));
    const result=[];let pos=0,aIdx=0,bPtr=0;
    for(const pair of pairs){
      while(aIdx<pair.aIdx){
        const vA=versesA[aIdx];
        result.push({id:'v_'+pos++,type:'verse',aW:[vA.label],bW:[]});
        vA.tokens.forEach(t=>result.push({id:'c_'+pos++,type:'unmatched',aW:[t.raw],bW:[]}));
        aIdx++;
      }
      while(bPtr<pair.bIdx){
        if(!matchedB.has(bPtr)){
          const vB=versesB[bPtr];
          result.push({id:'v_'+pos++,type:'verse',aW:[],bW:[vB.label]});
          vB.tokens.forEach(t=>result.push({id:'c_'+pos++,type:'unmatched',aW:[],bW:[t.raw]}));
        }
        bPtr++;
      }
      const vA=versesA[pair.aIdx],vB=versesB[pair.bIdx];
      result.push({id:'v_'+pos++,type:'verse',aW:[vA.label],bW:[vB.label]});
      buildChunks(lcs(vA.tokens,vB.tokens)).forEach(ch=>{ch.id='c_'+pos++;result.push(ch);});
      aIdx=pair.aIdx+1;bPtr=pair.bIdx+1;
    }
    while(aIdx<versesA.length){
      const vA=versesA[aIdx];
      result.push({id:'v_'+pos++,type:'verse',aW:[vA.label],bW:[]});
      vA.tokens.forEach(t=>result.push({id:'c_'+pos++,type:'unmatched',aW:[t.raw],bW:[]}));
      aIdx++;
    }
    while(bPtr<versesB.length){
      const vB=versesB[bPtr];
      result.push({id:'v_'+pos++,type:'verse',aW:[],bW:[vB.label]});
      vB.tokens.forEach(t=>result.push({id:'c_'+pos++,type:'unmatched',aW:[],bW:[t.raw]}));
      bPtr++;
    }
    return result;
  }catch(e){console.error('diff error',e);return[];}
}

const DIFF_COLORS={
  added:   {bg:"#166534",border:"1px solid #86efac",tc:"#dcfce7"},
  omitted: {bg:"#7f1d1d",border:"1px solid #fca5a5",tc:"#fee2e2"},
  changed: {bg:"#713f12",border:"1px solid #fde047",tc:"#fef9c3"},
};

function DiffPanel({unit}){
  const [open,setOpen]=useState(true);
  if(!unit||(!unit.chroniclesText&&!unit.sourceText)) return null;
  const diff=useMemo(()=>{try{return computeDiff(unit.chroniclesText||"",unit.sourceText||"");}catch{return [];}},
    [unit.chroniclesText,unit.sourceText]);
  function side(s,chunks){
    return chunks.map(ch=>{
      const t=ch.type;
      if(t==="verse") return <span key={ch.id} style={{color:"#475569",fontSize:"12px"}}>{(s==="a"?ch.aW:ch.bW).join(" ")} </span>;
      if(t==="equal") return <span key={ch.id} style={{color:"#e2e8f0"}}>{(s==="a"?ch.aW:ch.bW).join(" ")} </span>;
      let words,st=t;
      if(s==="a"){
        if(t==="omitted")return <span key={ch.id}/>;
        words=ch.aW; st=t==="changed"?"changed":"added";
      }else{
        if(t==="added")return <span key={ch.id}/>;
        words=ch.bW; st=t==="changed"?"changed":"omitted";
      }
      const c=DIFF_COLORS[st]||{};
      return <span key={ch.id}><span style={{background:c.bg,border:c.border,borderRadius:"4px",padding:"2px 5px",color:c.tc,fontWeight:"600",display:"inline-block"}}>{words.join(" ")}</span> </span>;
    });
  }
  return(
    <div style={{background:"#0f172a",border:"1px solid #334155",borderRadius:"10px",marginBottom:"12px"}}>
      <button onClick={()=>setOpen(o=>!o)} style={{width:"100%",display:"flex",justifyContent:"space-between",alignItems:"center",padding:"10px 14px",background:"none",border:"none",cursor:"pointer"}}>
        <span style={{fontSize:"13px",fontWeight:"700",color:"#f1f5f9"}}>📜 השוואה מסומנת</span>
        <div style={{display:"flex",gap:"6px",alignItems:"center"}}>
          {[["תוספת","#166534","#86efac"],["השמטה","#7f1d1d","#fca5a5"],["שינוי","#713f12","#fde047"]].map(([l,bg,tc])=>
            <span key={l} style={{background:bg,color:tc,padding:"1px 6px",borderRadius:"8px",fontSize:"10px",fontWeight:"700"}}>{l}</span>
          )}
          <span style={{color:"#64748b",fontSize:"12px"}}>{open?"▲":"▼"}</span>
        </div>
      </button>
      {open&&(
        <div style={{padding:"0 12px 12px"}}>
          <div style={{marginBottom:"12px"}}>
            <div style={{fontSize:"11px",fontWeight:"700",color:"#93c5fd",marginBottom:"6px"}}>דברי הימים</div>
            <div style={{background:"#1e293b",borderRadius:"6px",padding:"10px 14px",fontSize:"14px",lineHeight:"2.4"}}>
              {side("a",diff)}
            </div>
          </div>
          <div>
            <div style={{fontSize:"11px",fontWeight:"700",color:"#fbbf24",marginBottom:"6px"}}>{unit.sourceRef||"שמואל / מלכים"}</div>
            <div style={{background:"#1e293b",borderRadius:"6px",padding:"10px 14px",fontSize:"14px",lineHeight:"2.4"}}>
              {side("b",diff)}
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

// ── Entry editor ──────────────────────────────────────────────────────
function EntryEditor({unitId,conceptName,conceptParams,entry,onChange,unitText,sourceText,sourceRef,scholarship,analysisMode,customSemantic,character}){
  const e=entry||{explicit_note:"",implicit_note:"",params:(conceptParams||[]).map(()=>({found:null,verse:""}))};
  const [saved,setSaved]=useState(false);
  function upd(k,v){onChange({...e,[k]:v});}
  function updP(i,k,v){const ps=[...(e.params||[])];while(ps.length<(conceptParams||[]).length)ps.push({found:null,verse:""});ps[i]={...ps[i],[k]:v};onChange({...e,params:ps});}
  function saveAll(){onChange({...e});setSaved(true);setTimeout(()=>setSaved(false),2000);}
  const params=conceptParams||[];
  const modeLabel=analysisMode==="source"?'📙 מקבילה':'📘 דה"י';
  // חיפוש שדה סמנטי — קודם ב-SEMANTIC הקבוע, אחר כך ב-customSemantic
  const sem=(customSemantic||{})[conceptName]||SEMANTIC[conceptName]||null;

  // ── Explicit AI — שומר אוטומטית ────────────────────────────────────
  const [explAiLoad,setExplAiLoad]=useState(false);
  const [explAiRes,setExplAiRes]=useState("");

  async function runExplicitAI(){
    if(!unitText){setExplAiRes("אין טקסט ביחידה זו.");return;}
    if(!sem){setExplAiRes("אין שדה סמנטי מוגדר — פתחי את עריכת המושג והגדירי שדה סמנטי חיובי ושלילי.");return;}
    setExplAiLoad(true);setExplAiRes("");
    const prompt=`אתה עוזר מחקר לתזה בתנ"ך. בדוק האם מילים מהשדה הסמנטי של המושג "${conceptName}" מופיעות בטקסט.

שדה סמנטי חיובי: ${sem.pos}
שדה סמנטי שלילי (הפוך): ${sem.neg}

טקסט (${modeLabel}):
${unitText}

ענה בעברית בתמציתיות:
1. **מילים שנמצאו מהשדה החיובי** — כל מילה + מספר פסוק מדויק.
2. **מילים שנמצאו מהשדה ההפוך** — אותו פורמט.
3. **מסקנה** — האם המושג "${conceptName}" מופיע ישירות בטקסט?`;
    try{
      const res=await fetch("https://anthropic-proxy.anna-sho-ea8.workers.dev",{method:"POST",headers:{"Content-Type":"application/json"},
        body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:500,messages:[{role:"user",content:prompt}]})});
      const data=await res.json();
      const text=data.content?.map(b=>b.text||"").join("")||"שגיאה";
      setExplAiRes(text);
      // שמירה אוטומטית לתיבה
      onChange({...e,explicit_note:text});
    }catch(err){setExplAiRes("שגיאת חיבור: "+err.message);}
    setExplAiLoad(false);
  }

  // ── Implicit AI — ממלא פרמטרים אוטומטית ───────────────────────────
  const [implAiLoad,setImplAiLoad]=useState(false);
  const [implAiMsg,setImplAiMsg]=useState("");

  async function runImplicitAI(){
    if(!unitText){setImplAiMsg("אין טקסט ביחידה זו.");return;}
    const validParams=params.filter(p=>p&&(typeof p==="object"?p.q:p).trim());
    if(!validParams.length){setImplAiMsg("אין פרמטרים מוגדרים.");return;}
    setImplAiLoad(true);setImplAiMsg("");

    const paramsList=validParams.map((p,i)=>{
      const q=typeof p==="object"?p.q:p;
      const ind=typeof p==="object"?p.ind:"";
      return `${i+1}. שאלה: ${q}${ind?`\n   אינדיקטור: ${ind}`:""}`;
    }).join("\n\n");

    const semInfo=sem?`\nשדה סמנטי חיובי: ${sem.pos}\nשדה סמנטי שלילי: ${sem.neg}`:"";

    const prompt=`אתה עוזר מחקר לתזה בתנ"ך. בדוק האם המושג "${conceptName}" נרמז בטקסט לפי הפרמטרים.

⚠️ הנחיה קריטית: המחקר עוסק אך ורק בדמותו של ${character==="solomon"?"שלמה המלך":"דוד המלך"}. בדוק את הפרמטרים רק ביחס ל${character==="solomon"?"שלמה":"דוד"} — לא ביחס לדמויות אחרות המופיעות ביחידה כגון שרים, זקנים, עם, לויים או כל דמות אחרת.

טקסט (${modeLabel}):
${unitText}
${semInfo}
${e.explicit_note?`\nממצא גלוי שכבר נמצא:\n${e.explicit_note}`:""}

פרמטרים לבדיקה:
${paramsList}

הוראות קריטיות:
- ענה ONLY ב-JSON תקני, ללא טקסט לפני או אחרי
- עבור כל פרמטר לפי מספרו הסדרי (1 עד ${validParams.length})
- found: true אם יש ראיה ברורה בטקסט שמתייחסת ל${character==="solomon"?"שלמה":"דוד"} ספציפית, false אם לא
- verse: מספר הפסוק אם found=true (למשל "(א)" או "(ג)"), אחרת ""
- note: הסבר קצר בעברית (מקסימום 50 מילים) — ציין את הקשר ל${character==="solomon"?"שלמה":"דוד"}

פורמט JSON:
[
  {"param":1,"found":true,"verse":"(א)","note":"הסבר"},
  {"param":2,"found":false,"verse":"","note":"לא נמצא"},
  ...
]`;

    try{
      const res=await fetch("https://anthropic-proxy.anna-sho-ea8.workers.dev",{method:"POST",headers:{"Content-Type":"application/json"},
        body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:1000,messages:[{role:"user",content:prompt}]})});
      const data=await res.json();
      const raw=data.content?.map(b=>b.text||"").join("")||"";
      // Parse JSON
      const clean=raw.replace(/```json|```/g,"").trim();
      const parsed=JSON.parse(clean);
      // Fill params automatically
      const newPs=[...(e.params||[])];
      while(newPs.length<validParams.length)newPs.push({found:null,verse:""});
      parsed.forEach(item=>{
        const idx=item.param-1;
        if(idx>=0&&idx<validParams.length){
          newPs[idx]={found:item.found,verse:item.verse||"",note:item.note||""};
        }
      });
      // Build implicit note
      const notes=parsed.filter(item=>item.note).map(item=>`פרמטר ${item.param}: ${item.found?"✅":"❌"} ${item.note}`).join("\n");
      onChange({...e,params:newPs,implicit_note:notes});
      setImplAiMsg(`✓ ${parsed.filter(i=>i.found).length} פרמטרים נמצאו — עברי ותקני`);
    }catch(err){
      setImplAiMsg("שגיאה בפרסור JSON: "+err.message+". נסי שוב.");
    }
    setImplAiLoad(false);
  }

  return(
    <div>
      {/* ── גלוי ── */}
      <div style={{background:"#0f172a",borderRadius:"8px",padding:"12px",marginBottom:"12px",border:`1px solid ${e.explicit_note?"#34d39966":"#334155"}`}}>
        <div style={{fontSize:"12px",fontWeight:"700",color:"#34d399",marginBottom:"8px"}}>📗 גלוי — מופיע ישירות בטקסט {modeLabel}</div>
        {sem&&(
          <div style={{marginBottom:"8px"}}>
            <div style={{fontSize:"11px",color:"#64748b",marginBottom:"3px"}}>שדה סמנטי חיובי:</div>
            <div style={{fontSize:"12px",color:"#86efac",lineHeight:"1.7",background:"#0a1628",borderRadius:"5px",padding:"6px 10px"}}>
              {sem.pos}
            </div>
            <div style={{fontSize:"11px",color:"#64748b",marginBottom:"3px",marginTop:"6px"}}>שדה סמנטי הפך:</div>
            <div style={{fontSize:"12px",color:"#fca5a5",lineHeight:"1.7",background:"#1a0a0a",borderRadius:"5px",padding:"6px 10px"}}>
              {sem.neg}
            </div>
          </div>
        )}
        <button onClick={runExplicitAI} disabled={explAiLoad}
          style={{width:"100%",marginBottom:"8px",padding:"8px",borderRadius:"7px",border:"none",
            cursor:explAiLoad?"wait":"pointer",background:explAiLoad?"#1e293b":"#064e3b",
            color:explAiLoad?"#475569":"#34d399",fontSize:"13px",fontWeight:"700"}}>
          {explAiLoad?"⏳ מחפש...":"🔍 שלב א׳ — בדוק גלוי (נשמר אוטומטית)"}
        </button>
        {explAiRes&&(
          <div style={{background:"#022c22",border:"1px solid #065f46",borderRadius:"7px",padding:"10px 12px",
            fontSize:"12px",color:"#d1fae5",lineHeight:"1.8",whiteSpace:"pre-wrap",direction:"rtl",marginBottom:"8px"}}>
            {explAiRes}
          </div>
        )}
        <label style={{...S.label,marginTop:"6px"}}>הערות גלוי (ערכי ותקני)</label>
        <textarea value={e.explicit_note||""} onChange={ev=>upd("explicit_note",ev.target.value)} rows={4}
          placeholder="נשמר אוטומטית לאחר בדיקת ה-AI — ערכי לפי הצורך..."
          style={{...S.input,resize:"vertical",lineHeight:"1.7"}}/>
      </div>

      {/* ── נרמז ── */}
      <div style={{background:"#0f172a",borderRadius:"8px",padding:"12px",marginBottom:"10px",border:`1px solid ${(e.params||[]).some(p=>p.found===true)?"#818cf866":"#334155"}`}}>
        <div style={{fontSize:"12px",fontWeight:"700",color:"#818cf8",marginBottom:"8px"}}>
          📘 נרמז — {(e.params||[]).filter(p=>p.found===true).length}/{params.filter(p=>p&&(p.q||p).toString().trim()).length} פרמטרים נמצאו
        </div>
        <button onClick={runImplicitAI} disabled={implAiLoad}
          style={{width:"100%",marginBottom:"8px",padding:"8px",borderRadius:"7px",border:"none",
            cursor:implAiLoad?"wait":"pointer",background:implAiLoad?"#1e293b":"#312e81",
            color:implAiLoad?"#475569":"#a5b4fc",fontSize:"13px",fontWeight:"700"}}>
          {implAiLoad?"⏳ בודק פרמטרים...":"🤖 שלב ב׳ — התחל בדיקה בנרמז (ממלא אוטומטית)"}
        </button>
        {implAiMsg&&(
          <div style={{fontSize:"12px",color:implAiMsg.startsWith("✓")?"#34d399":"#fca5a5",marginBottom:"8px",padding:"6px 10px",background:"#1e293b",borderRadius:"6px"}}>
            {implAiMsg}
          </div>
        )}
        {params.length===0?(
          <div style={{fontSize:"12px",color:"#475569",marginBottom:"8px"}}>אין פרמטרים מוגדרים</div>
        ):(
          <div style={{marginBottom:"10px"}}>
            {params.map((param,i)=>{
              const paramQ=typeof param==="object"?(param.q||""):param;
              const paramInd=typeof param==="object"?(param.ind||""):"";
              if(!paramQ.trim())return null;
              const p=(e.params||[])[i]||{found:null,verse:""};
              return(
                <div key={i} style={{background:"#1e293b",borderRadius:"7px",padding:"10px",marginBottom:"6px",border:`1px solid ${p.found===true?"#818cf866":p.found===false?"#47456633":"#334155"}`}}>
                  <div style={{fontSize:"12px",color:"#cbd5e1",marginBottom:"5px",lineHeight:"1.6",fontWeight:"600"}}>{i+1}. {paramQ}</div>
                  {paramInd&&(
                    <div style={{fontSize:"11px",color:"#64748b",background:"#0a1628",borderRadius:"5px",padding:"6px 10px",marginBottom:"7px",lineHeight:"1.6",borderRight:"2px solid #334155"}}>
                      <span style={{color:"#475569",fontSize:"10px",fontWeight:"700"}}>אינדיקטור: </span>{paramInd}
                    </div>
                  )}
                  {p.note&&(
                    <div style={{fontSize:"11px",color:"#94a3b8",background:"#0f172a",borderRadius:"5px",padding:"5px 8px",marginBottom:"6px",lineHeight:"1.6",fontStyle:"italic"}}>
                      💬 {p.note}
                    </div>
                  )}
                  <div style={{display:"flex",gap:"7px",alignItems:"center",flexWrap:"wrap"}}>
                    {[["true","כן ✓","#818cf8"],["false","לא ✗","#475569"],["null","לא נבדק","#334155"]].map(([v,l,bg])=>(
                      <button key={v} onClick={()=>updP(i,"found",v==="null"?null:v==="true")}
                        style={{padding:"4px 12px",borderRadius:"14px",border:"none",cursor:"pointer",fontSize:"12px",fontWeight:"600",
                          background:String(p.found)===v?bg:"#0f172a",color:String(p.found)===v?"white":"#475569"}}>
                        {l}
                      </button>
                    ))}
                    {p.found===true&&<input value={p.verse||""} onChange={ev=>updP(i,"verse",ev.target.value)} placeholder="פסוק..." style={{...S.input,flex:1,minWidth:"100px",padding:"4px 8px",fontSize:"12px"}}/>}
                  </div>
                </div>
              );
            })}
          </div>
        )}
        {scholarship&&(
          <div style={{marginBottom:"10px",background:"#1e293b",borderRadius:"6px",padding:"10px 12px",border:"1px solid #334155"}}>
            <div style={{fontSize:"11px",fontWeight:"700",color:"#64748b",marginBottom:"4px"}}>📝 הערות מכלי ההשוואה</div>
            <div style={{fontSize:"12px",color:"#94a3b8",lineHeight:"1.7",whiteSpace:"pre-wrap"}}>{scholarship}</div>
          </div>
        )}
        <label style={{...S.label,marginTop:"6px"}}>הערות נרמז</label>
        <textarea value={e.implicit_note||""} onChange={ev=>upd("implicit_note",ev.target.value)} rows={3}
          placeholder="נשמר אוטומטית לאחר בדיקת ה-AI — ערכי לפי הצורך..."
          style={{...S.input,resize:"vertical",lineHeight:"1.7"}}/>
        {/* כפתור שמור שינויים */}
        <button onClick={saveAll}
          style={{width:"100%",marginTop:"10px",padding:"9px",borderRadius:"8px",border:"none",cursor:"pointer",
            background:saved?"#16a34a":"#1d4ed8",color:"white",fontSize:"13px",fontWeight:"700",transition:"background 0.3s"}}>
          {saved?"✓ נשמר!":"💾 שמור שינויים"}
        </button>
      </div>
    </div>
  );
}

// ── Header ────────────────────────────────────────────────────────────
function Header({msg,tab,setTab,onLoad,onSave,onSaveAs,onExportConcepts,onImportConcepts,onExportAll,onImportAll,onCloudSave,analysisMode,setAnalysisMode}){
  const fileRef=React.useRef();
  const fullImportRef=React.useRef();
  const modeColor=analysisMode==="chronicles"?"#93c5fd":"#fbbf24";
  const modeLabel=analysisMode==="chronicles"?"📘 ניתוח דה\"י":"📙 ניתוח מקבילות";
  return(
    <div style={{background:"#1e293b",borderBottom:"1px solid #334155",padding:"8px 16px",display:"flex",alignItems:"center",justifyContent:"space-between",flexWrap:"wrap",gap:"6px",position:"sticky",top:0,zIndex:100}}>
      <div style={{fontSize:"15px",fontWeight:"bold",color:"#f1f5f9",cursor:"pointer"}} onClick={()=>setTab("home")}>📖 כלי אנליטי</div>
      <div style={{display:"flex",gap:"6px",alignItems:"center",flexWrap:"wrap"}}>
        {msg&&<span style={{color:"#34d399",fontSize:"12px",fontWeight:"600"}}>{msg}</span>}
        <button onClick={onLoad} style={{padding:"4px 10px",borderRadius:"14px",border:"1px solid #475569",cursor:"pointer",fontSize:"12px",background:"#334155",color:"#94a3b8"}}>📂 פתח</button>
        <button onClick={onSave} style={{padding:"4px 10px",borderRadius:"14px",border:"none",cursor:"pointer",fontSize:"12px",background:"#16a34a",color:"white"}}>💾 שמור</button>
        <button onClick={onCloudSave} style={{padding:"4px 10px",borderRadius:"14px",border:"none",cursor:"pointer",fontSize:"12px",background:"#0891b2",color:"white"}}>☁️ שמור לענן</button>
        <span style={{width:"1px",height:"18px",background:"#334155",display:"inline-block"}}/>
        {/* Mode selector */}
        <div style={{display:"flex",gap:"3px",background:"#0f172a",borderRadius:"16px",padding:"2px",border:`1px solid ${modeColor}44`}}>
          {[["chronicles","📘 דה\"י","#93c5fd"],["source","📙 מקבילות","#fbbf24"]].map(([m,l,c])=>(
            <button key={m} onClick={()=>setAnalysisMode(m)}
              style={{padding:"3px 10px",borderRadius:"14px",border:"none",cursor:"pointer",fontSize:"11px",fontWeight:"700",
                background:analysisMode===m?c+"33":"transparent",color:analysisMode===m?c:"#475569"}}>
              {l}
            </button>
          ))}
        </div>
        <span style={{width:"1px",height:"18px",background:"#334155",display:"inline-block"}}/>
        {[["home","🏠"],["byunit","יחידה"],["byconcept","מושג"],["matrix","מטריצה"],["charts","גרפים"],["compare","🔍 סינתזה השוואתית"],["synthesis","✍️ כתיבה"]].map(([t,l])=>(
          <button key={t} onClick={()=>setTab(t)} style={{padding:"4px 10px",borderRadius:"14px",border:"none",cursor:"pointer",fontSize:"12px",fontWeight:"600",background:tab===t?"#818cf8":"transparent",color:tab===t?"white":"#64748b"}}>{l}</button>
        ))}
      </div>
    </div>
  );
}

// ── App ───────────────────────────────────────────────────────────────
function App(){
  const [raw,setRaw]=useState({units:[],overrides:{},concepts:{},analysis:{},analysis_chronicles:{},analysis_source:{},customConcepts:[]});
  const [tab,setTab]=useState("home");
  // analysisMode: "chronicles" = ניתוח דה"י, "source" = ניתוח מקבילה
  const [analysisMode,setAnalysisMode]=useState("chronicles");
  const [activeUnit,setActiveUnit]=useState(null);
  const [initConcept,setInitConcept]=useState(null);
  const [msg,setMsg]=useState("");
  const [editConcept,setEditConcept]=useState(null);
  const [showAdd,setShowAdd]=useState(false);
  const [newName,setNewName]=useState("");
  const [newDim,setNewDim]=useState("d1");
  const [newParams,setNewParams]=useState(Array(10).fill(""));

  function flash(m){setMsg(m);setTimeout(()=>setMsg(""),2000);}
  function cloudSave(){const d=window.__rawData||raw;fbSave(d);flash("☁️ נשמר לענן");}

  function setData(fn){
    setRaw(prev=>{
      const next=typeof fn==="function"?fn(prev):fn;
      LS.save(next);
      if(gFH)fsWrite(next).catch(()=>{});
      window.__rawData = next;
      return next;
    });
  }

  useEffect(()=>{ window.__rawData = raw; },[raw]);

  useEffect(()=>{
    let base={units:[],overrides:{},concepts:{},analysis:{},analysis_chronicles:{},analysis_source:{},customConcepts:[]};
    Object.keys(DEFAULT_CONCEPTS).forEach(name=>{
      base.concepts[name]={params: DEFAULT_CONCEPTS[name].params};
    });
    fbLoad(fbData=>{
      if(fbData&&fbData.units&&fbData.units.length>0){
        const merged={...base,...fbData,concepts:{...(fbData.concepts||{})}};
        if(fbData.analysis&&Object.keys(fbData.analysis).length>0&&(!fbData.analysis_chronicles||Object.keys(fbData.analysis_chronicles).length===0)){
          merged.analysis_chronicles=fbData.analysis;
        }
        setRaw(merged);
        flash("✓ נטען מהענן");
      } else {
        // Firebase empty — try localStorage fallback
        const d=LS.load();
        if(d&&d.units&&d.units.length>0){
          setRaw({...base,...d,concepts:{...base.concepts,...(d.concepts||{})}});
        } else {
          setRaw(base);
        }
      }
    });
  },[]);

  async function loadFile(){
    const d=await fsOpen();
    if(!d){alert("לא ניתן לקרוא");return;}
    const defaultConcepts={};
    Object.keys(DEFAULT_CONCEPTS).forEach(name=>{
      defaultConcepts[name]={params: DEFAULT_CONCEPTS[name].params};
    });
    const existingAnalysis=ALS.load()||raw.analysis||{};
    const existingChr=ACLS.load()||raw.analysis_chronicles||{};
    const existingSrc=ASLS.load()||raw.analysis_source||{};
    const existingConcepts=CLS.load()||raw.concepts||{};
    const merged={
      ...d,
      concepts:{...defaultConcepts,...(d.concepts||{}),...existingConcepts},
      analysis:{...existingAnalysis,...(d.analysis||{})},
      analysis_chronicles:{...existingChr,...(d.analysis_chronicles||{})},
      analysis_source:{...existingSrc,...(d.analysis_source||{})}
    };
    // Migrate old analysis to analysis_chronicles if needed
    if(merged.analysis&&Object.keys(merged.analysis).length>0&&(!merged.analysis_chronicles||Object.keys(merged.analysis_chronicles).length===0)){
      merged.analysis_chronicles=merged.analysis;
    }
    console.log("after merge, units count:", merged.units?.length);
    console.log("setRaw called with:", merged);
    setRaw(merged);
    LS.save(merged);
    fbSave(merged);
    flash("✓ נטען ונשמר בענן");
  }
  async function saveFile(){
    if(!gFH){const ok=await fsSave("chronicles_data.json");if(!ok)return;}
    const ok=await fsWrite(raw);
    ok?flash("✓ נשמר"):alert("שגיאה");
  }
  async function saveAs(){
    gFH=null;
    const ok=await fsSave("chronicles_data.json");if(!ok)return;
    await fsWrite(raw); flash("✓ נשמר");
  }

  // All concepts
  const allConcepts=useMemo(()=>{
    const r=[];
    DIMS.forEach(d=>d.concepts.forEach(name=>r.push({name,dimId:d.id})));
    (raw.customConcepts||[]).forEach(c=>r.push({name:c.name,dimId:c.dimId}));
    return r;
  },[raw.customConcepts]);

  // All units from app1
  const allUnits=useMemo(()=>{
    if(!(raw.units||[]).length)return [];
    return (raw.units||[]).map(u=>({
      id:u.id,label:u.name||u.chapter||"",character:u.character||"",
      chroniclesText:u.chroniclesText||"",sourceText:u.sourceText||"",
      sourceRef:u.sourceRef||"",scholarship:u.scholarship||"",
    }));
  },[raw.units]);

  function getE(uid,cname,mode){
    const store=mode==="source"?"analysis_source":"analysis_chronicles";
    return raw[store]?.[uid]?.[cname]||null;
  }
  const fbSaveTimer = React.useRef(null);
  function setE(uid,cname,entry,mode){
    const store=mode==="source"?"analysis_source":"analysis_chronicles";
    setRaw(prev=>{
      const updated={...prev,[store]:{...prev[store],[uid]:{...(prev[store]?.[uid]||{}),[cname]:entry}}};
      window.__rawData = updated;
      if(fbSaveTimer.current) clearTimeout(fbSaveTimer.current);
      fbSaveTimer.current = setTimeout(()=>fbSave(updated), 2000);
      return updated;
    });
  }
  function getParams(cname){const fromRaw=(raw.concepts?.[cname]?.params)||[];return fromRaw.length>0?fromRaw:(DEFAULT_CONCEPTS[cname]?.params)||[];}

  // Progress - based on current analysis mode
  const prog=useMemo(()=>{
    const tot=allUnits.length*allConcepts.length;
    let doneChr=0,doneSrc=0;
    allUnits.forEach(u=>allConcepts.forEach(c=>{
      const ec=getE(u.id,c.name,"chronicles");
      if(ec&&(ec.explicit_note||(ec.params||[]).some(p=>p.found!==null)))doneChr++;
      const es=getE(u.id,c.name,"source");
      if(es&&(es.explicit_note||(es.params||[]).some(p=>p.found!==null)))doneSrc++;
    }));
    return{tot,doneChr,doneSrc,pctChr:tot?Math.round(doneChr/tot*100):0,pctSrc:tot?Math.round(doneSrc/tot*100):0};
  },[raw.analysis_chronicles,raw.analysis_source,allUnits,allConcepts]);

  function saveConcept(name,params,sem){
    setRaw(prev=>{
      const updated={...prev,
        concepts:{...prev.concepts,[name]:{...(prev.concepts?.[name]||{}),params,sem}},
        customSemantic:{...(prev.customSemantic||{}),...(sem?{[name]:sem}:{})}
      };
      window.__rawData = updated;
      fbSave(updated);
      return updated;
    });
    setEditConcept(null); flash("✓ נשמר בענן");
  }
  function addConcept(){
    if(!newName.trim())return;
    setData(prev=>{
      const updated={...prev,
        customConcepts:[...(prev.customConcepts||[]),{name:newName.trim(),dimId:newDim}],
        concepts:{...prev.concepts,[newName.trim()]:{params:newParams}}
      };
      CLS.save(updated.concepts);
      return updated;
    });
    setNewName(""); setNewParams(Array(10).fill("")); setShowAdd(false); flash("✓ נוסף");
  }

  const dim4concept=(cname)=>DIMS.find(d=>d.concepts.includes(cname))||DIMS.find(d=>d.id===(raw.customConcepts||[]).find(c=>c.name===cname)?.dimId)||DIMS[0];

  function exportConcepts(){
    const exportData={concepts:raw.concepts||{},...(raw.customSemantic?{customSemantic:raw.customSemantic}:{})};
    const blob=new Blob([JSON.stringify(exportData,null,2)],{type:"application/json"});
    const a=document.createElement("a");a.href=URL.createObjectURL(blob);a.download="chronicles_concepts_backup.json";a.click();
    flash("✓ קריטריונים יוצאו");
  }
  function exportAll(){
    const all={};
    for(let i=0;i<localStorage.length;i++){const k=localStorage.key(i);all[k]=localStorage.getItem(k);}
    const blob=new Blob([JSON.stringify(all,null,2)],{type:"application/json"});
    const a=document.createElement("a");a.href=URL.createObjectURL(blob);a.download="chronicles_full_backup.json";a.click();
    flash("✓ גיבוי מלא יוצא");
  }
  function importAll(data){
    try{
      Object.entries(data).forEach(([k,v])=>localStorage.setItem(k,v));
      flash("✓ נתונים שוחזרו — טוען מחדש...");
      setTimeout(()=>window.location.reload(),800);
    }catch(e){alert("שגיאה בייבוא: "+e.message);}
  }
  function importConcepts(data){
    setData(prev=>{
      const importedConcepts=data.concepts||data;
      const updated={...prev,concepts:{...prev.concepts,...importedConcepts}};
      if(data.customSemantic)updated.customSemantic={...(prev.customSemantic||{}),...data.customSemantic};
      CLS.save(updated.concepts);
      return updated;
    });
    flash("✓ קריטריונים שוחזרו");
  }

  return(
    <div dir="rtl" style={{minHeight:"100vh",background:"#0f172a"}}>
      <Header msg={msg} tab={tab} setTab={setTab} onLoad={loadFile} onSave={saveFile} onSaveAs={saveAs} onExportConcepts={exportConcepts} onImportConcepts={importConcepts} onExportAll={exportAll} onImportAll={importAll} onCloudSave={cloudSave} analysisMode={analysisMode} setAnalysisMode={setAnalysisMode}/>

      {tab==="home"&&<HomeTab allUnits={allUnits} allConcepts={allConcepts} prog={prog} raw={raw} setTab={setTab} setEditConcept={setEditConcept} setShowAdd={setShowAdd} getE={getE} dim4concept={dim4concept} getParams={getParams} setInitConcept={setInitConcept} analysisMode={analysisMode} setAnalysisMode={setAnalysisMode}/>}
      {tab==="byunit"&&<ByUnitTab allUnits={allUnits} allConcepts={allConcepts} raw={raw} getE={getE} setE={setE} getParams={getParams} dim4concept={dim4concept} onUnitSelect={setActiveUnit} analysisMode={analysisMode}/>}
      {tab==="byconcept"&&<ByConceptTab allUnits={allUnits} allConcepts={allConcepts} raw={raw} getE={getE} setE={setE} getParams={getParams} dim4concept={dim4concept} initConcept={initConcept} setInitConcept={setInitConcept} setEditConcept={setEditConcept} analysisMode={analysisMode}/>}
      {tab==="matrix"&&<MatrixTab allUnits={allUnits} allConcepts={allConcepts} raw={raw} getE={getE} dim4concept={dim4concept} analysisMode={analysisMode}/>}
      {tab==="charts"&&<ChartsTab allUnits={allUnits} allConcepts={allConcepts} raw={raw} getE={getE} dim4concept={dim4concept} analysisMode={analysisMode}/>}
      {tab==="compare"&&<CompareTab allUnits={allUnits} allConcepts={allConcepts} getE={getE} dim4concept={dim4concept} getParams={getParams}/>}
      {tab==="synthesis"&&<SynthesisTab allUnits={allUnits} allConcepts={allConcepts} getE={getE} analysisMode={analysisMode}/>}

      {editConcept&&(()=>{
        const dim=dim4concept(editConcept);
        return(
        <Modal title={`✎ עריכת מושג — ${editConcept} | ${dim?.label||""}`} onClose={()=>setEditConcept(null)}>
          <ConceptParamsEditor key={editConcept+JSON.stringify(getParams(editConcept))} name={editConcept} params={getParams(editConcept)} semData={raw.customSemantic?.[editConcept]} dimLabel={dim?.label} onSave={saveConcept} onClose={()=>setEditConcept(null)}/>
        </Modal>
        );
      })()}
      {showAdd&&(
        <Modal title="הוספת מושג חדש" onClose={()=>setShowAdd(false)}>
          <label style={S.label}>שם</label>
          <input value={newName} onChange={e=>setNewName(e.target.value)} style={{...S.input,marginBottom:"10px"}}/>
          <label style={S.label}>ממד</label>
          <select value={newDim} onChange={e=>setNewDim(e.target.value)} style={{...S.input,marginBottom:"10px"}}>
            {DIMS.map(d=><option key={d.id} value={d.id}>{d.label}</option>)}
          </select>
          <label style={S.label}>פרמטרים</label>
          {newParams.map((p,i)=><input key={i} value={p} onChange={e=>{const a=[...newParams];a[i]=e.target.value;setNewParams(a);}} placeholder={`פרמטר ${i+1}`} style={{...S.input,marginBottom:"5px"}}/>)}
          <button onClick={addConcept} style={{...S.btnPrimary,marginTop:"10px"}}>✓ הוסף</button>
        </Modal>
      )}
    </div>
  );
}

function ConceptParamsEditor({name,params,semData,onSave,onClose}){
  const existing=semData||SEMANTIC[name]||{pos:"",neg:""};
  const [semPos,setSemPos]=useState(existing.pos||"");
  const [semNeg,setSemNeg]=useState(existing.neg||"");
  const [ps,setPs]=useState(()=>{
    const a=[...(params||[])];
    while(a.length<10)a.push({q:"",ind:""});
    return a.map(p=>typeof p==="object"&&p!==null?{q:p.q||"",ind:p.ind||""}:{q:String(p||""),ind:""});
  });
  function updQ(i,v){const a=[...ps];a[i]={...a[i],q:v};setPs(a);}
  function updI(i,v){const a=[...ps];a[i]={...a[i],ind:v};setPs(a);}
  return(
    <div>
      {/* Semantic fields */}
      <div style={{marginBottom:"14px",background:"#0f172a",borderRadius:"7px",padding:"12px",border:"1px solid #334155"}}>
        <div style={{fontSize:"11px",color:"#34d399",fontWeight:"700",marginBottom:"8px"}}>שדות סמנטיים</div>
        <label style={{...S.label,color:"#86efac"}}>שדה סמנטי חיובי</label>
        <textarea value={semPos} onChange={e=>setSemPos(e.target.value)} rows={2}
          placeholder="מילים מהשדה החיובי, מופרדות בפסיק..."
          style={{...S.input,resize:"vertical",fontSize:"12px",marginBottom:"8px"}}/>
        <label style={{...S.label,color:"#fca5a5"}}>שדה סמנטי שלילי (הפוך)</label>
        <textarea value={semNeg} onChange={e=>setSemNeg(e.target.value)} rows={2}
          placeholder="מילים מהשדה השלילי, מופרדות בפסיק..."
          style={{...S.input,resize:"vertical",fontSize:"12px"}}/>
      </div>
      {/* Parameters */}
      <div style={{fontSize:"11px",color:"#818cf8",fontWeight:"700",marginBottom:"8px"}}>10 פרמטרים ואינדיקטורים</div>
      {ps.map((p,i)=>(
        <div key={i} style={{marginBottom:"10px",background:"#0f172a",borderRadius:"7px",padding:"10px",border:"1px solid #334155"}}>
          <div style={{fontSize:"10px",color:"#64748b",fontWeight:"700",marginBottom:"5px"}}>פרמטר {i+1}</div>
          <input value={p.q} onChange={e=>updQ(i,e.target.value)} placeholder="שאלה אנליטית..." style={{...S.input,marginBottom:"5px"}}/>
          <textarea value={p.ind} onChange={e=>updI(i,e.target.value)} placeholder="אינדיקטור בטקסט..." rows={2} style={{...S.input,resize:"vertical",fontSize:"12px",color:"#94a3b8"}}/>
        </div>
      ))}
      <div style={{display:"flex",gap:"8px",marginTop:"10px"}}>
        <button onClick={()=>onSave(name,ps,{pos:semPos,neg:semNeg})} style={S.btnPrimary}>✓ שמור</button>
        <button onClick={onClose} style={{...S.btnPrimary,background:"#334155"}}>ביטול</button>
      </div>
    </div>
  );
}

function ConceptRow({conceptName,dimColor,params,entry,onChange,unitText,sourceText,sourceRef,scholarship,analysisMode,customSemantic,character,defaultOpen}){

  return(
    <div style={{marginBottom:"5px"}}>
      <button onClick={()=>setOpen(o=>!o)}
        style={{width:"100%",display:"flex",justifyContent:"space-between",alignItems:"center",padding:"8px 12px",borderRadius:"7px",border:`1px solid ${open?dimColor+"66":"#334155"}`,background:open?"#263148":"#1e293b",cursor:"pointer",textAlign:"right"}}>

        </div>

      {open&&(
        <div style={{background:"#1e293b",border:`1px solid ${dimColor}33`,borderTop:"none",borderRadius:"0 0 7px 7px",padding:"14px"}}>

  );

// ── Matrix Tab ────────────────────────────────────────────────────────
function MatrixTab({allUnits,allConcepts,raw,getE,dim4concept,analysisMode}){
  const [ch,setCh]=useState("all");
  const units=ch==="all"?allUnits:allUnits.filter(u=>u.character===ch||(ch==="david"&&!u.character));
  const modeColor=analysisMode==="chronicles"?"#93c5fd":"#fbbf24";
  const modeLabel=analysisMode==="chronicles"?'📘 דה"י':'📙 מקבילות';
  function cellSt(uid,cname){
    const e=getE(uid,cname,analysisMode);if(!e)return"empty";
    const hE=!!(e.explicit_note?.trim()),iN=(e.params||[]).filter(p=>p.found===true).length>0;
    if(hE&&iN)return"both";if(hE)return"explicit";if(iN)return"implicit";
    if((e.params||[]).some(p=>p.found===false))return"checked";return"empty";
  }
  const C={both:"#34d399",explicit:"#86efac",implicit:"#818cf8",checked:"#334155",empty:"#1e293b"};

// ── Charts Tab ────────────────────────────────────────────────────────
function ChartsTab({allUnits,allConcepts,raw,getE,dim4concept,analysisMode}){
  const modeColor=analysisMode==="chronicles"?"#93c5fd":"#fbbf24";
  const modeLabel=analysisMode==="chronicles"?'📘 דה"י':'📙 מקבילות';
  function Bar({val,max,color,label,val2,color2,label2}){
    const p=max?Math.round(val/max*100):0;
    const p2=max&&val2!=null?Math.round(val2/max*100):0;
    return(
      <div style={{marginBottom:"7px"}}>
        <div style={{display:"flex",justifyContent:"space-between",marginBottom:"2px"}}>
          <span style={{fontSize:"11px",color:"#94a3b8"}}>{label}</span>
          <span style={{fontSize:"11px",color:"#64748b"}}>{val}{val2!=null?` / ${val2}`:""}</span>
        </div>
        <div style={{background:"#0f172a",borderRadius:"4px",height:"9px",overflow:"hidden",display:"flex"}}>
          <div style={{width:p+"%",background:color,borderRadius:"4px",transition:"width 0.4s"}}/>
          {val2!=null&&<div style={{width:p2+"%",background:color2,transition:"width 0.4s"}}/>}
        </div>
      </div>
    );
  }
  const david=allUnits.filter(u=>u.character==="david"||!u.character);
  const solomon=allUnits.filter(u=>u.character==="solomon");
  return(
    <div style={{maxWidth:"800px",margin:"0 auto",padding:"20px 16px"}}>
      <div style={{...S.card,marginBottom:"16px"}}>
        <div style={{fontSize:"13px",fontWeight:"bold",color:modeColor,marginBottom:"8px"}}>מושגים לפי דמות — {modeLabel} <span style={{fontSize:"11px",color:"#64748b",fontWeight:"400"}}>■ כחול=דוד ■ סגול=שלמה</span></div>
        {DIMS.map(dim=>(
          <div key={dim.id} style={{marginBottom:"10px"}}>
            <div style={{fontSize:"10px",color:dim.color,fontWeight:"700",marginBottom:"5px"}}>{dim.label}</div>
            {allConcepts.filter(c=>c.dimId===dim.id).map(c=>{
              const d=david.filter(u=>{const e=getE(u.id,c.name,analysisMode);return e&&(e.explicit_note||(e.params||[]).some(p=>p.found===true));}).length;
              const s=solomon.filter(u=>{const e=getE(u.id,c.name,analysisMode);return e&&(e.explicit_note||(e.params||[]).some(p=>p.found===true));}).length;
              return <Bar key={c.name} label={c.name} val={d} val2={s} max={allUnits.length} color="#93c5fd" color2="#d8b4fe"/>;
            })}
          </div>
        ))}
      </div>
      <div style={S.card}>
        <div style={{fontSize:"13px",fontWeight:"bold",color:modeColor,marginBottom:"8px"}}>גלוי מול נרמז — {modeLabel} <span style={{fontSize:"11px",color:"#64748b",fontWeight:"400"}}>■ ירוק=גלוי ■ סגול=נרמז</span></div>
        {DIMS.map(dim=>(
          <div key={dim.id} style={{marginBottom:"10px"}}>
            <div style={{fontSize:"10px",color:dim.color,fontWeight:"700",marginBottom:"5px"}}>{dim.label}</div>
            {allConcepts.filter(c=>c.dimId===dim.id).map(c=>{
              const exp=allUnits.filter(u=>{const e=getE(u.id,c.name,analysisMode);return !!(e?.explicit_note?.trim());}).length;
              const imp=allUnits.filter(u=>{const e=getE(u.id,c.name,analysisMode);return (e?.params||[]).some(p=>p.found===true);}).length;
              return <Bar key={c.name} label={c.name} val={exp} val2={imp} max={allUnits.length} color="#34d399" color2="#818cf8"/>;
            })}
          </div>
        ))}
      </div>
    </div>
  );
}


// ── Compare Tab (סינתזה השוואתית) ────────────────────────────────────
function CompareTab({allUnits,allConcepts,getE,dim4concept,getParams}){
  const [selUnit,setSelUnit]=useState(null);
  const [aiLoading,setAiLoading]=useState(false);
  const [aiResult,setAiResult]=useState("");
  const unit=allUnits.find(u=>u.id===selUnit);

  function getChrEntry(uid,cname){ return getE(uid,cname,"chronicles"); }
  function getSrcEntry(uid,cname){ return getE(uid,cname,"source"); }

  function conceptStatus(uid,cname){
    const ec=getChrEntry(uid,cname);
    const es=getSrcEntry(uid,cname);
    const chrFound=ec&&(ec.explicit_note?.trim()||(ec.params||[]).some(p=>p.found===true));
    const srcFound=es&&(es.explicit_note?.trim()||(es.params||[]).some(p=>p.found===true));
    if(chrFound&&srcFound)return"both";
    if(chrFound)return"chr_only";
    if(srcFound)return"src_only";
    const chrChecked=ec&&(ec.params||[]).some(p=>p.found!==null);
    const srcChecked=es&&(es.params||[]).some(p=>p.found!==null);
    if(chrChecked||srcChecked)return"neither_checked";
    return"empty";
  }

  const STATUS_STYLE={
    both:      {bg:"#166534",tc:"#86efac",label:"בדה\"י ובמקבילה"},
    chr_only:  {bg:"#1e3a5f",tc:"#93c5fd",label:"רק בדה\"י"},
    src_only:  {bg:"#713f12",tc:"#fbbf24",label:"רק במקבילה"},
    neither_checked:{bg:"#334155",tc:"#94a3b8",label:"נבדק — לא נמצא"},
    empty:     {bg:"transparent",tc:"#475569",label:"טרם נבדק"},
  };

  async function runCompareSynthesis(){
    if(!unit)return;
    setAiLoading(true);setAiResult("");

    // Build comparison summary
    const compLines=[];
    DIMS.forEach(dim=>{
      const chrFound=[],srcFound=[],bothFound=[],onlyChr=[],onlySrc=[];
      allConcepts.filter(c=>c.dimId===dim.id).forEach(c=>{
        const st=conceptStatus(unit.id,c.name);
        if(st==="both")bothFound.push(c.name);
        else if(st==="chr_only")onlyChr.push(c.name);
        else if(st==="src_only")onlySrc.push(c.name);
      });
      if(bothFound.length||onlyChr.length||onlySrc.length){
        const parts=[];
        if(bothFound.length)parts.push("בשניהם: "+bothFound.join(", "));
        if(onlyChr.length)parts.push("רק בדה\"י: "+onlyChr.join(", "));
        if(onlySrc.length)parts.push("רק במקבילה: "+onlySrc.join(", "));
        compLines.push(dim.label+"\n"+parts.map(p=>"  • "+p).join("\n"));
      }
    });

    // Build diff summary
    let diffSummary="";
    try{
      const diff=computeDiff(unit.chroniclesText||"",unit.sourceText||"");
      const added=[],omitted=[],changed=[];
      diff.forEach(ch=>{
        if(ch.type==="added"&&ch.aW?.length)added.push(ch.aW.join(" "));
        else if(ch.type==="omitted"&&ch.bW?.length)omitted.push(ch.bW.join(" "));
        else if(ch.type==="changed")changed.push((ch.aW||[]).join(" "));
      });
      const parts=[];
      if(added.length)parts.push("תוספות ("+added.length+"): "+added.join(", "));
      if(omitted.length)parts.push("השמטות ("+omitted.length+"): "+omitted.join(", "));
      if(changed.length)parts.push("שינויים ("+changed.length+"): "+changed.join(", "));
      diffSummary=parts.join(" | ")||"אין הבדלים";
    }catch{}

    const prompt=`אתה עוזר מחקר לתזה בתנ"ך. נתח את ממצאי הניתוח ההשוואתי.

יחידה: ${unit.label} | דמות: ${unit.character==="david"?"דוד":"שלמה"} | מקביל: ${unit.sourceRef||"—"}

שינויים שעשה הכרוניסט:
${diffSummary}

ממצאי הניתוח ההשוואתי:
${compLines.join("\n\n")||"אין ממצאים עדיין"}

ענה בעברית אקדמית קצרה (100-150 מילה):
1. מושגים שהכרוניסט הוסיף (רק בדה"י) — מה משמעותם?
2. מושגים שנעדרים מדה"י — מה ניתן ללמוד מכך?
3. מסקנה: כיצד שינויי הכרוניסט קשורים לחזון הנבואי?`;

    try{
      const res=await fetch("https://anthropic-proxy.anna-sho-ea8.workers.dev",{method:"POST",headers:{"Content-Type":"application/json"},
        body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:600,messages:[{role:"user",content:prompt}]})});
      const data=await res.json();
      setAiResult(data.content?.map(b=>b.text||"").join("")||"שגיאה");
    }catch(e){setAiResult("שגיאת חיבור: "+e.message);}
    setAiLoading(false);
  }

  const davidUnits=allUnits.filter(u=>u.character==="david"||!u.character);
  const solomonUnits=allUnits.filter(u=>u.character==="solomon");

  return(
    <div style={{display:"grid",gridTemplateColumns:"200px 1fr",height:"calc(100vh - 46px)"}}>
      {/* Sidebar */}
      <div style={{background:"#1e293b",borderLeft:"1px solid #334155",overflowY:"auto",padding:"10px"}}>
        <div style={{fontSize:"11px",fontWeight:"700",color:"#34d399",marginBottom:"8px"}}>🔍 בחרי יחידה</div>
        {[["דוד","david","#93c5fd",davidUnits],["שלמה","solomon","#d8b4fe",solomonUnits]].map(([name,ch,color,us])=>(
          <div key={ch} style={{marginBottom:"10px"}}>
            <div style={{fontSize:"10px",color,fontWeight:"700",marginBottom:"4px"}}>👑 {name}</div>
            {us.map(u=>{
              const hasChr=allConcepts.some(c=>{const e=getChrEntry(u.id,c.name);return e&&(e.explicit_note||(e.params||[]).some(p=>p.found!==null));});
              const hasSrc=allConcepts.some(c=>{const e=getSrcEntry(u.id,c.name);return e&&(e.explicit_note||(e.params||[]).some(p=>p.found!==null));});
              return(
                <button key={u.id} onClick={()=>{setSelUnit(u.id);setAiResult("");}}
                  style={{display:"block",width:"100%",textAlign:"right",padding:"6px 8px",borderRadius:"6px",border:"none",cursor:"pointer",marginBottom:"2px",fontSize:"11px",
                    background:selUnit===u.id?"#334155":"transparent",color:selUnit===u.id?"#f1f5f9":"#64748b",
                    borderRight:selUnit===u.id?"3px solid #34d399":"3px solid transparent"}}>
                  <span>{u.label}</span>
                  <span style={{float:"left",fontSize:"9px"}}>
                    {hasChr&&<span style={{color:"#93c5fd"}}>📘</span>}
                    {hasSrc&&<span style={{color:"#fbbf24"}}>📙</span>}
                  </span>
                </button>
              );
            })}
          </div>
        ))}
      </div>

      {/* Main */}
      <div style={{overflowY:"auto",padding:"16px"}}>
        {!unit?(
          <div style={{padding:"60px",textAlign:"center",color:"#334155"}}>
            <div style={{fontSize:"40px",marginBottom:"12px"}}>🔍</div>
            <div style={{fontSize:"14px",color:"#475569"}}>בחרי יחידה לסינתזה השוואתית</div>
            <div style={{fontSize:"12px",color:"#334155",marginTop:"6px"}}>השוואה בין ניתוח דה"י לניתוח המקבילה</div>
          </div>
        ):(
          <>
            {/* Header */}
            <div style={{background:"linear-gradient(135deg,#1e293b,#0f172a)",border:"1px solid #334155",borderRadius:"10px",padding:"14px 18px",marginBottom:"16px"}}>
              <div style={{fontSize:"16px",fontWeight:"bold",color:"#f1f5f9",marginBottom:"4px"}}>{unit.label}</div>
              <div style={{fontSize:"12px",color:"#64748b"}}>{unit.character==="david"?"👑 דוד":"👑 שלמה"}{unit.sourceRef&&` | מקביל: ${unit.sourceRef}`}</div>
              <div style={{display:"flex",gap:"10px",marginTop:"10px",flexWrap:"wrap"}}>
                {[["📘 ניתוח דה\"י","#93c5fd"],[" 📙 ניתוח מקבילה","#fbbf24"]].map(([l,c])=>(
                  <span key={l} style={{background:c+"22",border:`1px solid ${c}44`,color:c,padding:"2px 10px",borderRadius:"10px",fontSize:"11px",fontWeight:"700"}}>{l}</span>
                ))}
              </div>
            </div>

            {/* Legend */}
            <div style={{display:"flex",gap:"8px",marginBottom:"12px",flexWrap:"wrap"}}>
              {Object.entries(STATUS_STYLE).filter(([k])=>k!=="empty").map(([k,v])=>(
                <span key={k} style={{background:v.bg,color:v.tc,padding:"2px 10px",borderRadius:"10px",fontSize:"11px",fontWeight:"700"}}>● {v.label}</span>
              ))}
            </div>

            {/* Comparison by dimension */}
            {DIMS.map(dim=>{
              const cs=allConcepts.filter(c=>c.dimId===dim.id);
              return(
                <div key={dim.id} style={{background:"#1e293b",border:`1px solid ${dim.color}33`,borderRadius:"10px",padding:"12px 14px",marginBottom:"10px"}}>
                  <div style={{fontSize:"12px",fontWeight:"700",color:dim.color,marginBottom:"10px"}}>{dim.label}</div>
                  <div style={{display:"grid",gap:"6px"}}>
                    {cs.map(c=>{
                      const st=conceptStatus(unit.id,c.name);
                      const sty=STATUS_STYLE[st];
                      const ec=getChrEntry(unit.id,c.name);
                      const es=getSrcEntry(unit.id,c.name);
                      const chrImplN=(ec?.params||[]).filter(p=>p.found===true).length;
                      const srcImplN=(es?.params||[]).filter(p=>p.found===true).length;
                      const chrVerse=(ec?.params||[]).filter(p=>p.found===true&&p.verse).map(p=>p.verse).join(", ");
                      const srcVerse=(es?.params||[]).filter(p=>p.found===true&&p.verse).map(p=>p.verse).join(", ");
                      if(st==="empty")return(
                        <div key={c.name} style={{display:"flex",alignItems:"center",gap:"8px",padding:"6px 10px",borderRadius:"6px",background:"#0f172a",opacity:0.4}}>
                          <span style={{fontSize:"12px",color:"#475569"}}>{c.name}</span>
                          <span style={{fontSize:"10px",color:"#334155"}}>טרם נבדק</span>
                        </div>
                      );
                      return(
                        <div key={c.name} style={{background:sty.bg+"33",border:`1px solid ${sty.bg}`,borderRadius:"6px",padding:"8px 10px"}}>
                          <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",gap:"8px"}}>
                            <span style={{fontSize:"13px",fontWeight:"700",color:sty.tc}}>{c.name}</span>
                            <span style={{background:sty.bg,color:sty.tc,padding:"1px 8px",borderRadius:"8px",fontSize:"10px",fontWeight:"700",whiteSpace:"nowrap"}}>{sty.label}</span>
                          </div>
                          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"6px",marginTop:"6px"}}>

                              <div style={{fontSize:"10px",fontWeight:"700",color:"#93c5fd",marginBottom:"3px"}}>📘 דה"י</div>
                              {ec?.explicit_note?.trim()&&<div style={{fontSize:"11px",color:"#d1fae5",marginBottom:"3px",lineHeight:"1.5"}}>{ec.explicit_note.substring(0,80)}{ec.explicit_note.length>80?"...":""}</div>}
                              {chrImplN>0&&<div style={{fontSize:"10px",color:"#93c5fd"}}>נרמז: {chrImplN} פרמטרים{chrVerse&&` | פסוק: ${chrVerse}`}</div>}
                              {!ec?.explicit_note?.trim()&&chrImplN===0&&(ec?.params||[]).some(p=>p.found!==null)&&<div style={{fontSize:"10px",color:"#475569"}}>נבדק — לא נמצא</div>}
                            </div>
                            {/* Src side */}
                            <div style={{background:"#3f2a0022",borderRadius:"5px",padding:"6px 8px",borderRight:"2px solid #fbbf2444"}}>
                              <div style={{fontSize:"10px",fontWeight:"700",color:"#fbbf24",marginBottom:"3px"}}>📙 מקבילה</div>
                              {es?.explicit_note?.trim()&&<div style={{fontSize:"11px",color:"#fef3c7",marginBottom:"3px",lineHeight:"1.5"}}>{es.explicit_note.substring(0,80)}{es.explicit_note.length>80?"...":""}</div>}
                              {srcImplN>0&&<div style={{fontSize:"10px",color:"#fbbf24"}}>נרמז: {srcImplN} פרמטרים{srcVerse&&` | פסוק: ${srcVerse}`}</div>}
                              {!es?.explicit_note?.trim()&&srcImplN===0&&(es?.params||[]).some(p=>p.found!==null)&&<div style={{fontSize:"10px",color:"#475569"}}>נבדק — לא נמצא</div>}
                            </div>
                          </div>
                        </div>
                      );
                    })}
                  </div>
                </div>
              );
            })}

            {/* AI Synthesis */}
            <div style={{background:"#1e293b",border:"1px solid #334155",borderRadius:"10px",padding:"14px",marginTop:"8px"}}>
              <div style={{fontSize:"13px",fontWeight:"700",color:"#a78bfa",marginBottom:"10px"}}>🤖 סינתזה השוואתית — AI</div>
              <button onClick={runCompareSynthesis} disabled={aiLoading}
                style={{width:"100%",padding:"10px",borderRadius:"8px",border:"none",cursor:aiLoading?"wait":"pointer",
                  background:aiLoading?"#334155":"#7c3aed",color:aiLoading?"#475569":"white",fontSize:"13px",fontWeight:"700",marginBottom:"10px"}}>
                {aiLoading?"⏳ מנתח...":"🔍 נתח את ההבדלים בין דה\"י למקבילה"}
              </button>
              {aiResult&&(
                <div style={{background:"#0f172a",border:"1px solid #7c3aed44",borderRadius:"8px",padding:"12px 14px",fontSize:"13px",color:"#e2e8f0",lineHeight:"1.9",whiteSpace:"pre-wrap",direction:"rtl"}}>
                  {aiResult}
                </div>
              )}
            </div>
          </>
        )}
      </div>
    </div>
  );
}

// ── Synthesis Tab ─────────────────────────────────────────────────────
const SYNTH_KEY="chronicles_synthesis_v1";
const SLS={
  load(){ try{const r=localStorage.getItem(SYNTH_KEY);return r?JSON.parse(r):{};}catch{return{};} },
  save(d){ try{localStorage.setItem(SYNTH_KEY,JSON.stringify(d));}catch{} }
};

function SynthesisTab({allUnits,allConcepts,getE,analysisMode}){
  const [mode,setMode]=React.useState("unit");
  const [selUnit,setSelUnit]=React.useState(null);
  const [selDim,setSelDim]=React.useState("d1");
  const [aiLoading,setAiLoading]=React.useState(false);
  const [aiResult,setAiResult]=React.useState("");
  const [editText,setEditText]=React.useState("");
  const [scholars,setScholars]=React.useState("");
  const [saved,setSaved]=React.useState(()=>SLS.load());
  const [showSaved,setShowSaved]=React.useState(false);
  const [saveMsg,setSaveMsg]=React.useState("");

  function flash(m){setSaveMsg(m);setTimeout(()=>setSaveMsg(""),2500);}

  function buildDiffSummary(u){
    try{
      const diff=computeDiff(u.chroniclesText||"",u.sourceText||"");
      const added=[],omitted=[],changed=[];
      diff.forEach(ch=>{
        if(ch.type==="added"&&ch.aW&&ch.aW.length)added.push(ch.aW.join(" "));
        else if(ch.type==="omitted"&&ch.bW&&ch.bW.length)omitted.push(ch.bW.join(" "));
        else if(ch.type==="changed"){const w=(ch.aW||[]).join(" ");if(w)changed.push(w);}
      });
      const parts=[];
      if(added.length)parts.push("תוספות ("+added.length+"): "+added.join(", "));
      if(omitted.length)parts.push("השמטות ("+omitted.length+"): "+omitted.join(", "));
      if(changed.length)parts.push("שינויים ("+changed.length+"): "+changed.join(", "));
      return parts.join(" | ")||"אין הבדלים מסומנים";
    }catch{return"—";}
  }

  function buildAnalysisSummary(uid){
    const lines=[];
    DIMS.forEach(dim=>{
      const found=[];
      allConcepts.filter(c=>c.dimId===dim.id).forEach(c=>{
        const e=getE(uid,c.name,analysisMode);
        if(!e)return;
        const hasExp=!!(e.explicit_note&&e.explicit_note.trim());
        const implCount=(e.params||[]).filter(p=>p.found===true).length;
        const implVerses=(e.params||[]).filter(p=>p.found===true&&p.verse).map(p=>p.verse).join(", ");
        if(hasExp||implCount>0){
          let entry=c.name;
          if(hasExp)entry+=" [גלוי: "+(e.explicit_note.substring(0,100))+(e.explicit_note.length>100?"...":"")+"]";
          if(implCount>0)entry+=" [נרמז: "+implCount+" פרמטרים"+(implVerses?" — פסוקים: "+implVerses:"")+"]";
          found.push(entry);
        }
      });
      if(found.length)lines.push(dim.label+":\n"+found.map(f=>"  • "+f).join("\n"));
    });
    return lines.join("\n\n")||"טרם בוצע ניתוח ליחידה זו";
  }
