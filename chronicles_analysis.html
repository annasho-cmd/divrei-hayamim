<script type="text/babel">
const {useState,useEffect,useMemo,useRef} = React;

// ── File API ──────────────────────────────────────────────────────────
let gFH = null;
async function fsSave(suggestedName){

// ── Diff engine ───────────────────────────────────────────────────────
function stripNiqqud(s){ return s.replace(/[\u0591-\u05C7]/g,''); }
const NORM_MAP = {'דויד':'דוד','ירושלים':'ירושלם'};
function norm(w){
  const str = typeof w==='object'?w.word:w;
  const s = stripNiqqud(str).replace(/[׃׀:.,;()\[\]״׳"'!?]+/g,'').trim();
  return NORM_MAP[s]||s;
}
// tokenize returns [{raw, clean, isVerse}]
// raw  = original token (e.g. "(א)")
// clean = stripped of punctuation (e.g. "א" or "ישראל")
// isVerse = true only for tokens like (א) (יב) — paren-wrapped 1-4 Hebrew letters
function tokenize(t){
  if(!t) return [];
  return t.trim().split(/[\s\n\r]+/).map(raw=>{
    const isVerse = /^\([\u05D0-\u05EA]{1,4}\)$/.test(raw.trim());
    const clean   = raw.replace(/^[׃:,.;()\[\]״׳"'!?]+|[׃:,.;()\[\]״׳"'!?]+$/g,'');
    return {raw, clean, isVerse};
  }).filter(t=>t.raw.length>0);
}

// ── LCS diff ─────────────────────────────────────────────────────────
// Deterministic ID based on position — so IDs survive re-renders
function mkId(i){ return 'chunk_'+i; }

function lcs(a,b){
  // a,b are arrays of non-verse token objects
  const m=a.length,n=b.length;
  const dp=[];
  for(let i=0;i<=m;i++){dp[i]=new Array(n+1).fill(0);}
  for(let i=1;i<=m;i++)
    for(let j=1;j<=n;j++)
      dp[i][j]=norm(a[i-1].clean)===norm(b[j-1].clean)
        ?dp[i-1][j-1]+1
        :Math.max(dp[i-1][j],dp[i][j-1]);
  const r=[];let i=m,j=n;
  while(i>0||j>0){
    if(i>0&&j>0&&norm(a[i-1].clean)===norm(b[j-1].clean)){r.unshift({t:'eq',a:a[i-1].raw,b:b[j-1].raw});i--;j--;}
    else if(j>0&&(i===0||dp[i][j-1]>=dp[i-1][j])){r.unshift({t:'om',b:b[j-1].raw});j--;}
    else{r.unshift({t:'ad',a:a[i-1].raw});i--;}
  }
  return r;
}

function buildChunks(raw){
  const res=[];let i=0,pos=0;
  while(i<raw.length){
    const c=raw[i];
    if(c.t==='ad'&&raw[i+1]&&raw[i+1].t==='om'){
      res.push({id:mkId(pos++),type:'changed',aW:[c.a],bW:[raw[i+1].b]});i+=2;
    } else if(c.t==='om'&&raw[i+1]&&raw[i+1].t==='ad'){
      res.push({id:mkId(pos++),type:'changed',aW:[raw[i+1].a],bW:[c.b]});i+=2;
    } else if(c.t==='ad'){
      res.push({id:mkId(pos++),type:'added',aW:[c.a],bW:[]});i++;
    } else if(c.t==='om'){
      res.push({id:mkId(pos++),type:'omitted',aW:[],bW:[c.b]});i++;
    } else {
      res.push({id:mkId(pos++),type:'equal',aW:[c.a],bW:[c.b]});i++;
    }
  }
  return res;
}

// Split text into verse segments: [{label, tokens}]
function splitToVerses(allTokens){
  const segs=[];let cur={label:'',tokens:[]};
  allTokens.forEach(t=>{
    if(t.isVerse){if(cur.tokens.length||cur.label)segs.push(cur);cur={label:t.raw,tokens:[]};}
    else{cur.tokens.push(t);}
  });
  if(cur.tokens.length||cur.label)segs.push(cur);
  return segs;
}
function verseSim(tokensA,tokensB){
  if(!tokensA.length&&!tokensB.length)return 1;
  if(!tokensA.length||!tokensB.length)return 0;
  const setA=new Set(tokensA.map(t=>norm(t.clean)).filter(w=>w.length>1));
  const setB=new Set(tokensB.map(t=>norm(t.clean)).filter(w=>w.length>1));
  if(!setA.size&&!setB.size)return 1;
  if(!setA.size||!setB.size)return 0;
  let common=0;setA.forEach(w=>{if(setB.has(w))common++;});
  return common/Math.max(setA.size,setB.size);
}
function matchVerses(versesA,versesB,threshold=0.25){
  const m=versesA.length,n=versesB.length;
  const sim=Array.from({length:m},(_,i)=>Array.from({length:n},(_,j)=>verseSim(versesA[i].tokens,versesB[j].tokens)));
  const dp=Array.from({length:m+1},()=>new Array(n+1).fill(0));
  for(let i=1;i<=m;i++)for(let j=1;j<=n;j++)
    dp[i][j]=sim[i-1][j-1]>=threshold?dp[i-1][j-1]+1:Math.max(dp[i-1][j],dp[i][j-1]);
  const pairs=[];let i=m,j=n;
  while(i>0&&j>0){
    if(sim[i-1][j-1]>=threshold&&dp[i][j]===dp[i-1][j-1]+1){pairs.unshift({aIdx:i-1,bIdx:j-1});i--;j--;}
    else if(dp[i-1][j]>=dp[i][j-1])i--;else j--;
  }
  return pairs;
}
function computeDiff(tA,tB){
  try{
    const allA=tokenize(tA),allB=tokenize(tB);
    if(!allA.length&&!allB.length)return[];
    const versesA=splitToVerses(allA),versesB=splitToVerses(allB);
    const pairs=matchVerses(versesA,versesB);
    const matchedB=new Set(pairs.map(p=>p.bIdx));
    const result=[];let pos=0,aIdx=0,bPtr=0;
    for(const pair of pairs){
      while(aIdx<pair.aIdx){
        const vA=versesA[aIdx];
        result.push({id:'v_'+pos++,type:'verse',aW:[vA.label],bW:[]});
        vA.tokens.forEach(t=>result.push({id:'c_'+pos++,type:'unmatched',aW:[t.raw],bW:[]}));
        aIdx++;
      }
      while(bPtr<pair.bIdx){
        if(!matchedB.has(bPtr)){
          const vB=versesB[bPtr];
          result.push({id:'v_'+pos++,type:'verse',aW:[],bW:[vB.label]});
          vB.tokens.forEach(t=>result.push({id:'c_'+pos++,type:'unmatched',aW:[],bW:[t.raw]}));
        }
        bPtr++;
      }
      const vA=versesA[pair.aIdx],vB=versesB[pair.bIdx];
      result.push({id:'v_'+pos++,type:'verse',aW:[vA.label],bW:[vB.label]});
      buildChunks(lcs(vA.tokens,vB.tokens)).forEach(ch=>{ch.id='c_'+pos++;result.push(ch);});
      aIdx=pair.aIdx+1;bPtr=pair.bIdx+1;
    }
    while(aIdx<versesA.length){
      const vA=versesA[aIdx];
      result.push({id:'v_'+pos++,type:'verse',aW:[vA.label],bW:[]});
      vA.tokens.forEach(t=>result.push({id:'c_'+pos++,type:'unmatched',aW:[t.raw],bW:[]}));
      aIdx++;
    }
    while(bPtr<versesB.length){
      const vB=versesB[bPtr];
      result.push({id:'v_'+pos++,type:'verse',aW:[],bW:[vB.label]});
      vB.tokens.forEach(t=>result.push({id:'c_'+pos++,type:'unmatched',aW:[],bW:[t.raw]}));
      bPtr++;
    }
    return result;
  }catch(e){console.error('diff error',e);return[];}
}

const DIFF_COLORS={
  added:   {bg:"#166534",border:"1px solid #86efac",tc:"#dcfce7"},
  omitted: {bg:"#7f1d1d",border:"1px solid #fca5a5",tc:"#fee2e2"},
  changed: {bg:"#713f12",border:"1px solid #fde047",tc:"#fef9c3"},
};

function DiffPanel({unit}){
  const [open,setOpen]=useState(true);
  if(!unit||(!unit.chroniclesText&&!unit.sourceText)) return null;
  const diff=useMemo(()=>{try{return computeDiff(unit.chroniclesText||"",unit.sourceText||"");}catch{return [];}},
    [unit.chroniclesText,unit.sourceText]);
  function side(s,chunks){
    return chunks.map(ch=>{
      const t=ch.type;
      if(t==="verse") return <span key={ch.id} style={{color:"#475569",fontSize:"12px"}}>{(s==="a"?ch.aW:ch.bW).join(" ")} </span>;
      if(t==="equal") return <span key={ch.id} style={{color:"#e2e8f0"}}>{(s==="a"?ch.aW:ch.bW).join(" ")} </span>;
      let words,st=t;
      if(s==="a"){
        if(t==="omitted")return <span key={ch.id}/>;
        words=ch.aW; st=t==="changed"?"changed":"added";
      }else{
        if(t==="added")return <span key={ch.id}/>;
        words=ch.bW; st=t==="changed"?"changed":"omitted";
      }
      const c=DIFF_COLORS[st]||{};
      return <span key={ch.id}><span style={{background:c.bg,border:c.border,borderRadius:"4px",padding:"2px 5px",color:c.tc,fontWeight:"600",display:"inline-block"}}>{words.join(" ")}</span> </span>;
    });
  }
  return(
    <div style={{background:"#0f172a",border:"1px solid #334155",borderRadius:"10px",marginBottom:"12px"}}>
      <button onClick={()=>setOpen(o=>!o)} style={{width:"100%",display:"flex",justifyContent:"space-between",alignItems:"center",padding:"10px 14px",background:"none",border:"none",cursor:"pointer"}}>
        <span style={{fontSize:"13px",fontWeight:"700",color:"#f1f5f9"}}>📜 השוואה מסומנת</span>
        <div style={{display:"flex",gap:"6px",alignItems:"center"}}>
          {[["תוספת","#166534","#86efac"],["השמטה","#7f1d1d","#fca5a5"],["שינוי","#713f12","#fde047"]].map(([l,bg,tc])=>
            <span key={l} style={{background:bg,color:tc,padding:"1px 6px",borderRadius:"8px",fontSize:"10px",fontWeight:"700"}}>{l}</span>
          )}
          <span style={{color:"#64748b",fontSize:"12px"}}>{open?"▲":"▼"}</span>
        </div>
      </button>
      {open&&(
        <div style={{padding:"0 12px 12px"}}>
          <div style={{marginBottom:"12px"}}>
            <div style={{fontSize:"11px",fontWeight:"700",color:"#93c5fd",marginBottom:"6px"}}>דברי הימים</div>
            <div style={{background:"#1e293b",borderRadius:"6px",padding:"10px 14px",fontSize:"14px",lineHeight:"2.4"}}>
              {side("a",diff)}
            </div>
          </div>
          <div>
            <div style={{fontSize:"11px",fontWeight:"700",color:"#fbbf24",marginBottom:"6px"}}>{unit.sourceRef||"שמואל / מלכים"}</div>
            <div style={{background:"#1e293b",borderRadius:"6px",padding:"10px 14px",fontSize:"14px",lineHeight:"2.4"}}>
              {side("b",diff)}
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

const DIMS=[

const FB_PATH = "research";
let pendingFbSaves = 0; // counts saves that haven't been confirmed by the server yet
const FB_BASE_SHAPE = {units:[],overrides:{},concepts:{},analysis:{},analysis_chronicles:{},analysis_source:{},customConcepts:[],compareNotes:{},compareFactual:{},unitSummary:{}};
// fbSave — שמירה "עוורת" (כותבת בדיוק את מה שקיבלה, בלי לבדוק מה יש בשרת). נשמרת לתאימות, אך עדיף שלא להשתמש בה לשינויים חלקיים.
const fbSave = (data) => {
  pendingFbSaves++;
  let p;
  try{
    p = db.ref(FB_PATH).set({json: JSON.stringify(data)});
  }catch(e){
    console.error("FB save error",e);
    pendingFbSaves--;
    return Promise.reject(e);
  }
  return p.then(()=>{ pendingFbSaves--; })
          .catch(err=>{ pendingFbSaves--; console.error("FB save error",err); throw err; });
};
// fbSaveMerge — קוראת קודם את המצב העדכני בפועל מהשרת, ומחילה את ה-patch שלך *מעל* התמונה הטרייה הזו (לא מעל מה שהיה בזיכרון המקומי).
// כך לשונית "ישנה" לא יכולה לדרוס נתונים שנכתבו במקביל ע"י לשונית/כלי אחר — היא רק משנה את מה שהתבקש לשנות.
// כל הקריאות מסודרות בתור (fbMergeQueue) כדי שלא יתבצעו שתי קריאות-שינוי-כתיבה במקביל מתוך הלשונית הזו עצמה.
// patchFn מקבל את הנתונים הטריים מהשרת ומחזיר אובייקט מעודכן. מחזירה את התוצאה הסופית שנכתבה, כדי שאפשר לסנכרן אליה את ה-state המקומי.
let fbMergeQueue = Promise.resolve();
const fbSaveMerge = (patchFn) => {
  pendingFbSaves++;
  const run = async () => {
    try{
      const snap = await db.ref(FB_PATH).once("value");
      const v = snap.val();
      let serverData;
      try{ serverData = v ? JSON.parse(v.json) : {...FB_BASE_SHAPE}; }
      catch{ serverData = {...FB_BASE_SHAPE}; }
      const merged = patchFn({...FB_BASE_SHAPE, ...serverData});
      await db.ref(FB_PATH).set({json: JSON.stringify(merged)});
      return merged;
    }catch(err){
      console.error("FB save error",err);
      throw err;
    }finally{
      pendingFbSaves--;
    }
  };
  const result = fbMergeQueue.then(run);
  fbMergeQueue = result.catch(()=>{}); // השרשרת ממשיכה לרוץ גם אחרי כשלון, כדי שכשלון אחד לא יחסום שמירות עתידיות
  return result;
};
const fbLoad = (cb) => {
  db.ref(FB_PATH).once("value").then(snap => {
    const v=snap.val();
    if(!v){cb(null);return;}
    try{ cb(JSON.parse(v.json)); }catch{ cb(null); }
  });
};

});

}

// כל הקוד כאן הוא שכבת תצוגה מעל אותם getE/setE/getParams — אינו נוגע בשמירה.
// ════════════════════════════════════════════════════════════════════════
const AI_URL="https://anthropic-proxy.anna-sho-ea8.workers.dev";
async function aiCall(prompt,maxTokens){
  const res=await fetch(AI_URL,{method:"POST",headers:{"Content-Type":"application/json"},
    body:JSON.stringify({model:"claude-sonnet-4-6",max_tokens:maxTokens,messages:[{role:"user",content:prompt}]})});
  const data=await res.json();
  if(!data.content||!data.content.length) throw new Error("שגיאת AI: "+aiErrorText(data));
  return data.content.map(b=>b.text||"").join("");
}
function parseParamJSON(rawText){
  const clean=rawText.replace(/```json|```/g,"").trim();
  try{ return JSON.parse(clean); }
  catch(e){ const last=clean.lastIndexOf("},"); if(last>0) return JSON.parse(clean.substring(0,last+1)+"]"); throw e; }
}
function validParamDefs(params){ return (params||[]).filter(p=>p&&(typeof p==="object"?p.q:p).toString().trim()); }
function alignParams(existing,n){
  const a=Array.isArray(existing)?existing.map(p=>({found:(p&&p.found!==undefined)?p.found:null,verse:(p&&p.verse)||"",note:(p&&p.note)||""})):[];
  while(a.length<n)a.push({found:null,verse:"",note:""});
  return a.slice(0,n);
}
function paramText(p){ return typeof p==="object"?(p.q||""):String(p||""); }
function paramInd(p){ return typeof p==="object"?(p.ind||""):""; }

async function aiExplicit({conceptName,sem,unitText,modeLabel}){
  const prompt=`אתה עוזר מחקר לתזה בתנ"ך. בדוק האם מילים מהשדה הסמנטי של המושג "${conceptName}" מופיעות בטקסט.

שדה סמנטי חיובי: ${sem.pos}
שדה סמנטי שלילי (הפוך): ${sem.neg}

טקסט (${modeLabel}):
${unitText}

ענה בעברית בתמציתיות:
1. **מילים שנמצאו מהשדה החיובי** — כל מילה + מספר פסוק מדויק.
2. **מילים שנמצאו מהשדה ההפוך** — אותו פורמט.
3. **מסקנה** — האם המושג "${conceptName}" מופיע ישירות בטקסט?`;
  return await aiCall(prompt,500);
}
function buildParamPrompt({conceptName,validParams,sem,unitText,modeLabel,character,explicitNote,scholarship}){
  const paramsList=validParams.map((p,i)=>{const q=paramText(p),ind=paramInd(p);return `${i+1}. שאלה: ${q}${ind?`\n   אינדיקטור: ${ind}`:""}`;}).join("\n\n");
  const semInfo=sem?`\nשדה סמנטי חיובי: ${sem.pos}\nשדה סמנטי שלילי: ${sem.neg}`:"";
  const who=character==="solomon"?"שלמה":"דוד";
  const scholarBlock=scholarship?`\n📝 השוואת פרשנים על יחידה זו (יש להתחשב בה ולשקלל אותה בבדיקה):\n${scholarship}\n`:"";
  return `אתה עוזר מחקר לתזה בתנ"ך. בדוק${scholarship?" מחדש":""} האם המושג "${conceptName}" נרמז בטקסט לפי הפרמטרים${scholarship?", בהתחשב בהשוואת הפרשנים המצורפת":""}.

⚠️ הנחיה קריטית: המחקר עוסק אך ורק בדמותו של ${who} המלך. בדוק את הפרמטרים רק ביחס ל${who} — לא ביחס לדמויות אחרות המופיעות ביחידה כגון שרים, זקנים, עם, לויים או כל דמות אחרת.

טקסט (${modeLabel}):
${unitText}
${semInfo}
${explicitNote?`\nממצא גלוי שכבר נמצא:\n${explicitNote}`:""}${scholarBlock}

פרמטרים לבדיקה:
${paramsList}

הוראות קריטיות:
- ענה ONLY ב-JSON תקני, ללא טקסט לפני או אחרי
- עבור כל פרמטר לפי מספרו הסדרי (1 עד ${validParams.length})
- found: true אם יש ראיה ברורה בטקסט שמתייחסת ל${who} ספציפית${scholarship?", בהתחשב בפרשנים":""}, false אם לא
- verse: מספר הפסוק אם found=true (למשל "(א)" או "(ג)"), אחרת ""
- note: הסבר קצר בעברית (מקסימום 50 מילים)${scholarship?" — ציין כיצד הפרשנים השפיעו על המסקנה, אם בכלל":` — ציין את הקשר ל${who}`}

פורמט JSON:
[
  {"param":1,"found":true,"verse":"(א)","note":"הסבר"},
  {"param":2,"found":false,"verse":"","note":"לא נמצא"}
]`;
}
async function aiParams(opts){
  const raw=await aiCall(buildParamPrompt(opts),4000);
  const parsed=parseParamJSON(raw);
  return opts.validParams.map((p,i)=>{const it=parsed.find(x=>x.param-1===i);return it?{found:it.found,verse:it.verse||"",note:it.note||""}:{found:null,verse:"",note:""};});
}

// ── סטטוס בן-4-מצבים — מוסק מהנתונים בלבד ──
function conceptStatusA(entry,mode,hasParams){
  const hasExplicit=!!(entry&&entry.explicit_note&&entry.explicit_note.trim());
  const hasImplicit=!!(entry&&(entry.params||[]).some(p=>p&&p.found!==null));
  const hasScholar=!!(entry&&(entry.params_scholar||[]).some(p=>p&&p.found!==null));
  if(!hasExplicit&&!hasImplicit&&!hasScholar) return "none";
  if(!hasParams) return hasExplicit?"done":"progress";          // מושג עם שדה סמנטי בלבד — הושלם אחרי גלוי
  if(mode==="source") return (hasExplicit&&hasImplicit)?"done":"progress";  // מקבילה — שני שלבים
  if(hasExplicit&&hasImplicit&&hasScholar) return "done";        // דה"י — שלושה שלבים
  if(hasImplicit&&!hasScholar) return "await_scholar";           // ממתין לפרשנים
  return "progress";
}
const STATUS_META={
  none:{c:"#475569",ic:"○",t:"טרם התחיל"},
  progress:{c:"#818cf8",ic:"◐",t:"בתהליך"},
  await_scholar:{c:"#c084fc",ic:"◑",t:"ממתין לאימות בפרשנים"},
  done:{c:"#34d399",ic:"●",t:"הושלם"},
};
function StatusDot({status}){
  const m=STATUS_META[status]||STATUS_META.none;
  return <span title={m.t} style={{color:m.c,fontSize:"12px",marginLeft:"5px",fontWeight:"700"}}>{m.ic}</span>;
}

// ── מסך 2 — רכזת הניתוח ──
function Screen2Hub({unit,mode,allConcepts,getParams,getE,setE,dim4concept,raw,onBack}){
  const [activeConcept,setActiveConcept]=useState(null);
  const [station,setStation]=useState(null); // null | explicit | implicit | scholar
  const isChr=mode==="chronicles";
  const modeColor=isChr?"#93c5fd":"#fbbf24";
  const modeLabel=isChr?'📘 דה"י':'📙 מקבילה';
  const unitText=isChr?unit.chroniclesText:unit.sourceText;
  const character=unit.character||"david";
  const entry=activeConcept?getE(unit.id,activeConcept,mode):null;
  const params=activeConcept?getParams(activeConcept):[];
  const validCount=validParamDefs(params).length;
  const hasParams=validCount>0;
  const sem=activeConcept?((raw.customSemantic||{})[activeConcept]||SEMANTIC[activeConcept]||null):null;

  const orderedConcepts=[];
  DIMS.forEach(d=>d.concepts.forEach(name=>{ if(allConcepts.find(c=>c.name===name)) orderedConcepts.push(name); }));
  allConcepts.forEach(c=>{ if(!orderedConcepts.includes(c.name)) orderedConcepts.push(c.name); });

  function pickConcept(name){ setActiveConcept(name); setStation(null); }
  function commit(patch){ setE(unit.id,activeConcept,{...(entry||{}),...patch},mode); setStation(null); }
  function nextConcept(){
    const idx=orderedConcepts.indexOf(activeConcept);
    const nxt=orderedConcepts[idx+1];
    if(nxt){ setActiveConcept(nxt); setStation(null); }
    else { setActiveConcept(null); setStation(null); }
  }

  const stationProps={conceptName:activeConcept,params,sem,unitText,modeLabel,character,
    scholarship:unit.scholarship,entry,onSave:commit,onClose:()=>setStation(null)};

  return(
    <div style={{display:"flex",flexDirection:"column",height:"calc(100vh - 46px)"}}>
      {/* ── אזור עליון קבוע: טקסט + שם היחידה ── */}
      <div style={{flexShrink:0,padding:"10px 16px",borderBottom:"1px solid #334155",background:"#0f172a"}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:"6px"}}>
          <button onClick={onBack} style={{padding:"5px 12px",borderRadius:"8px",border:"none",cursor:"pointer",background:"#334155",color:"#cbd5e1",fontSize:"12px",fontWeight:"600"}}>↩ בחירת יחידה</button>
          <div style={{textAlign:"center"}}>
            <div style={{fontSize:"15px",fontWeight:"bold",color:"#f1f5f9"}}>{unit.label} <span style={{fontSize:"12px",color:modeColor}}>· {modeLabel}</span></div>
            {unit.sourceRef&&<div style={{fontSize:"11px",color:"#64748b"}}>מקביל: {unit.sourceRef}</div>}
          </div>
          <div style={{width:"90px"}}/>
        </div>
        <div style={{background:"#1e293b",border:`1px solid ${modeColor}44`,borderRadius:"8px",padding:"10px 14px",fontSize:"13px",lineHeight:"2",color:"#e2e8f0",maxHeight:"170px",overflowY:"auto"}}>
          {unitText||<span style={{color:"#475569"}}>אין טקסט ליחידה זו</span>}
        </div>
      </div>

      {/* ── מתחת לטקסט: מרכז עבודה (ימין) + רשימת מושגים (שמאל) ── */}
      <div style={{display:"grid",gridTemplateColumns:"1fr 240px",flex:1,overflow:"hidden"}}>
        {/* מרכז */}
        <div style={{overflowY:"auto",padding:"16px"}}>
          {!activeConcept?(
            <div style={{padding:"50px",textAlign:"center",color:"#475569",fontSize:"14px"}}>בחרי מושג מהרשימה משמאל</div>
          ):station==="explicit"?(
            <ExplicitStation {...stationProps}/>
          ):station==="implicit"?(
            <ImplicitStation {...stationProps}/>
          ):station==="scholar"?(
            <ScholarStation {...stationProps}/>
          ):(
            // ── רכזת: שלושת הכפתורים ──
            <div style={{maxWidth:"560px",margin:"0 auto"}}>
              <div style={{fontSize:"17px",fontWeight:"700",color:"#f1f5f9",marginBottom:"4px"}}>{activeConcept}</div>
              <div style={{fontSize:"12px",color:"#64748b",marginBottom:"20px"}}>בחרי חלק לעבודה. אחרי שמירה החלק נסגר וחוזרים לכאן.</div>
              {[
                {key:"explicit",label:"📗 מבנה גלוי",desc:"שדה סמנטי — בדיקת ה-AI ואישור",color:"#34d399",done:!!(entry&&entry.explicit_note&&entry.explicit_note.trim()),active:true},
                {key:"implicit",label:"📘 מבנה נרמז",desc:hasParams?"פרמטרים ואינדיקטורים":"אין פרמטרים (שדה סמנטי בלבד)",color:"#818cf8",done:!!(entry&&(entry.params||[]).some(p=>p&&p.found!==null)),active:hasParams},
                ...(isChr?[{key:"scholar",label:"📖 בדיקה מול פרשנים",desc:unit.scholarship?"בדיקה חוזרת מול הפרשנים":"אין פרשנים שמורים ליחידה",color:"#c084fc",done:!!(entry&&(entry.params_scholar||[]).some(p=>p&&p.found!==null)),active:hasParams&&!!unit.scholarship}]:[])
              ].map(b=>(
                <button key={b.key} onClick={()=>b.active&&setStation(b.key)} disabled={!b.active}
                  style={{display:"flex",justifyContent:"space-between",alignItems:"center",width:"100%",textAlign:"right",padding:"16px 18px",borderRadius:"12px",marginBottom:"12px",
                    cursor:b.active?"pointer":"not-allowed",border:`1px solid ${b.active?b.color+"55":"#334155"}`,
                    background:b.active?b.color+"14":"#1e293b",color:b.active?b.color:"#475569"}}>
                  <div>
                    <div style={{fontSize:"15px",fontWeight:"700"}}>{b.label} {b.done&&<span style={{color:"#34d399",fontSize:"13px"}}>✓ נשמר</span>}</div>
                    <div style={{fontSize:"12px",color:"#64748b",marginTop:"3px",fontWeight:"400"}}>{b.desc}</div>
                  </div>
                  <span style={{fontSize:"18px"}}>{b.active?"›":"🔒"}</span>
                </button>

              <button onClick={nextConcept}
                style={{width:"100%",marginTop:"10px",padding:"12px",borderRadius:"10px",border:"1px dashed #475569",cursor:"pointer",background:"transparent",color:"#94a3b8",fontSize:"13px",fontWeight:"700"}}>
                המשך למושג הבא ↩
              </button>
            </div>
          )}
        </div>

        {/* רשימת מושגים — משמאל */}
        <div style={{background:"#1e293b",borderRight:"1px solid #334155",overflowY:"auto",padding:"10px"}}>
          <div style={{fontSize:"11px",fontWeight:"700",color:"#64748b",marginBottom:"8px"}}>מושגים ({orderedConcepts.length})</div>
          {DIMS.map(dim=>{
            const cs=allConcepts.filter(c=>c.dimId===dim.id);
            if(!cs.length)return null;
            return(
              <div key={dim.id} style={{marginBottom:"10px"}}>
                <div style={{fontSize:"10px",color:dim.color,fontWeight:"700",marginBottom:"4px"}}>{dim.label.split(":")[1]?dim.label.split(":")[1].trim():dim.label}</div>
                {cs.map(c=>{
                  const e=getE(unit.id,c.name,mode);
                  const hp=validParamDefs(getParams(c.name)).length>0;
                  const st=conceptStatusA(e,mode,hp);
                  const isActive=activeConcept===c.name;
                  return(
                    <button key={c.name} onClick={()=>pickConcept(c.name)}
                      style={{display:"flex",alignItems:"center",justifyContent:"space-between",width:"100%",textAlign:"right",padding:"6px 8px",borderRadius:"6px",border:"none",cursor:"pointer",marginBottom:"2px",fontSize:"12px",
                        background:isActive?dim.color+"33":"transparent",color:isActive?dim.color:st==="done"?"#34d399":"#94a3b8",
                        borderRight:isActive?`3px solid ${dim.color}`:"3px solid transparent",fontWeight:isActive?"700":"400"}}>
                      <span>{c.name}</span>
                      <StatusDot status={st}/>
                    </button>
                  );
                })}
              </div>
            );
          })}
          <div style={{marginTop:"12px",paddingTop:"10px",borderTop:"1px solid #334155",fontSize:"10px",color:"#64748b",lineHeight:"1.9"}}>
            <div><span style={{color:STATUS_META.done.c}}>●</span> הושלם</div>
            <div><span style={{color:STATUS_META.await_scholar.c}}>◑</span> ממתין לפרשנים</div>
            <div><span style={{color:STATUS_META.progress.c}}>◐</span> בתהליך</div>
            <div><span style={{color:STATUS_META.none.c}}>○</span> טרם התחיל</div>
          </div>
        </div>
      </div>
    </div>
  );
}

// ── עוטף שלב א' ──
function StageA({allUnits,allConcepts,getE,setE,getParams,dim4concept,raw}){
  const [phase,setPhase]=useState("pick");
  const [sel,setSel]=useState(null); // {unit, mode}
  if(phase==="pick"||!sel)
    return <Screen1Picker allUnits={allUnits} onStart={(unit,mode)=>{setSel({unit,mode});setPhase("hub");}}/>;
  return <Screen2Hub unit={sel.unit} mode={sel.mode} allConcepts={allConcepts} getParams={getParams} getE={getE} setE={setE} dim4concept={dim4concept} raw={raw} onBack={()=>{setPhase("pick");setSel(null);}}/>;
}

// ── שלב ב' — סינתזה והשוואה  (מסך 1 בחירה → מסך 2 השוואה → מסך 3 סיכום) ──
// קורא בלבד מנתוני שלב א' (getE לשני המצבים). תוצריו נשמרים במפתחות נפרדים:
//   compareNotes (מסקנה מחקרית — קיים) · compareFactual (ניתוח עובדתי) · unitSummary (סיכום יחידה)
// ════════════════════════════════════════════════════════════════════════
function fmtParamStatus(pe){
  if(!pe) return "לא נבדק";
  return pe.found===true?`כן${pe.verse?` ${pe.verse}`:""}`:pe.found===false?"לא":"לא נבדק";
}
function buildCompareParamsText(validParams,ec,es){
  if(!validParams.length) return "אין פרמטרים מוגדרים למושג זה.";
  return validParams.map((p,i)=>{
    const c=(ec.params||[])[i]||{}, s=(es.params||[])[i]||{};
    return `${i+1}. ${paramText(p)}\n   דה"י: ${fmtParamStatus(c)}${c.note?` — ${c.note}`:""}\n   מקבילה: ${fmtParamStatus(s)}${s.note?` — ${s.note}`:""}`;
  }).join("\n");
}
function buildDiffSummaryText(unit){
  try{
    const diff=computeDiff(unit.chroniclesText||"",unit.sourceText||"");
    const added=[],omitted=[],changed=[];
    diff.forEach(ch=>{
      if(ch.type==="added"&&ch.aW&&ch.aW.length)added.push(ch.aW.join(" "));
      else if(ch.type==="omitted"&&ch.bW&&ch.bW.length)omitted.push(ch.bW.join(" "));
      else if(ch.type==="changed")changed.push(`"${(ch.bW||[]).join(" ")}" ← "${(ch.aW||[]).join(" ")}"`);
    });
    const parts=[];
    if(added.length)parts.push(`תוספות בדה"י (${added.length}): ${added.join(", ")}`);
    if(omitted.length)parts.push(`השמטות מהמקבילה (${omitted.length}): ${omitted.join(", ")}`);
    if(changed.length)parts.push(`שינויי מילים (${changed.length}): ${changed.join(", ")}`);
    return parts.length?parts.join("\n"):"אין הבדלים מסומנים אוטומטית";
  }catch{ return "אין הבדלים מסומנים אוטומטית"; }
}

                    background:isSel?"#34d39922":"#0f172a",color:isSel?"#34d399":"#cbd5e1",borderRight:isSel?"3px solid #34d399":"3px solid transparent"}}>
                  {u.label}{u.sourceRef&&<span style={{fontSize:"11px",color:"#64748b"}}> · {u.sourceRef}</span>}
                </button>
              );

          {sel&&(
            <div style={{background:"#0f172a",borderRadius:"10px",padding:"16px",border:"1px solid #334155"}}>
              <div style={{fontSize:"14px",fontWeight:"700",color:"#f1f5f9",marginBottom:"12px"}}>{sel.label}</div>
              <div style={{display:"flex",gap:"20px",marginBottom:"14px",flexWrap:"wrap"}}>
                <div style={{fontSize:"13px",color:chrOk?"#34d399":"#f87171",fontWeight:"600"}}>{chrOk?"✅":"❌"} דה"י {chrOk?"— נותח":"— טרם נותח"}</div>
                <div style={{fontSize:"13px",color:srcOk?"#34d399":"#f87171",fontWeight:"600"}}>{srcOk?"✅":"❌"} מקבילה {srcOk?"— נותחה":"— טרם נותחה"}</div>
              </div>
              {!ready&&<div style={{fontSize:"12px",color:"#fca5a5",marginBottom:"12px"}}>יש להשלים את ניתוח שתי היחידות בשלב א' לפני התחלת הסינתזה.</div>}
              <div style={{display:"flex",gap:"10px",flexWrap:"wrap"}}>
                <button onClick={()=>ready&&onOpen(sel.id)} disabled={!ready}
                  style={{flex:1,minWidth:"180px",padding:"14px",borderRadius:"10px",border:"none",cursor:ready?"pointer":"not-allowed",
                    background:ready?"#818cf8":"#1e293b",color:ready?"white":"#475569",fontSize:"15px",fontWeight:"700"}}>הצג השוואה</button>
                <button onClick={()=>onSummary(sel.id)}
                  style={{padding:"14px 18px",borderRadius:"10px",border:"1px solid #475569",cursor:"pointer",background:"transparent",color:"#94a3b8",fontSize:"13px",fontWeight:"700"}}>סיכום היחידה →</button>
              </div>
            </div>
          )}
        </>
      )}
    </div>
  );
}

// ── בלוק: ניתוח השוואתי עובדתי + מסקנה מחקרית (אזורים ג'+ד') ──
function CompareConceptBlock({unit,conceptName,validParams,ec,es,esc,scholarship,getFactual,setFactual,getCompareNote,setCompareNote}){
  const [factual,setFactualText]=useState(getFactual(unit.id,conceptName)||"");
  const [conclusion,setConclusion]=useState(getCompareNote(unit.id,conceptName)||"");
  const [loadF,setLoadF]=useState(false);
  const [loadC,setLoadC]=useState(false);
  const [savedF,setSavedF]=useState(false);
  const [savedC,setSavedC]=useState(false);
  React.useEffect(()=>{ setFactualText(getFactual(unit.id,conceptName)||""); setConclusion(getCompareNote(unit.id,conceptName)||""); },[unit.id,conceptName]);

  const who=unit.character==="solomon"?"שלמה":"דוד";
  const paramsText=buildCompareParamsText(validParams,ec,es);
  const diffText=buildDiffSummaryText(unit);
  const scholarText=(esc&&esc.params_scholar&&esc.params_scholar.some(p=>p&&p.found!==null))
    ? "\n── בדיקת הנרמז של דה\"י לאחר שקלול פרשנים ──\n"+buildCompareParamsText(validParams,{params:esc.params_scholar},{params:[]}).replace(/\n   מקבילה: לא נבדק/g,"")
    : "";

  async function runFactual(){
    setLoadF(true);
    const prompt=`אתה עוזר מחקר לתזה בתנ"ך. תאר באופן עובדתי בלבד את ההבדל בביטוי המושג "${conceptName}" בין דברי הימים למקבילה (${unit.sourceRef||"שמואל/מלכים"}), ברמת הפרמטרים. הניתוח עוסק בדמות ${who}.

תוצאות הפרמטרים בשתי היחידות (כן/לא + פסוק):
${paramsText}

שינויים טקסטואליים שזוהו בין הטקסטים:
${diffText}

ענה בעברית, תיאור עובדתי קצר וממוקד (ללא מסקנה תיאולוגית או פרשנית), בשלושה סעיפים:
1. **פרמטרים שנוספו בדה"י** — קיימים בדה"י ולא במקבילה (עם מספרי פסוקים).
2. **פרמטרים שנגרעו** — קיימים במקבילה ולא בדה"י.
3. **פרמטרים שהתחזקו / נחלשו** — שינוי בעוצמת הביטוי או בניסוח.
אם אין שינוי בסעיף מסוים — ציין "אין".`;
    try{ setFactualText(await aiCall(prompt,800)); }catch(e){ setFactualText("⚠️ "+e.message); }
    setLoadF(false);
  }
  async function runConclusion(){
    setLoadC(true);
    const prompt=`אתה עוזר מחקר לתזה בתנ"ך, הבוחן את השפעת שינויי הכרוניסט על מושג ספציפי בהשוואה בין דברי הימים למקבילה.

מושג: "${conceptName}"
יחידה: ${unit.label} | דמות: ${who} | מקביל: ${unit.sourceRef||"—"}

תוצאות הפרמטרים בשתי היחידות:
${paramsText}${scholarText}

שינויים טקסטואליים בין הטקסטים:
${diffText}

${factual?`ניתוח השוואתי עובדתי שכבר נכתב:\n${factual}\n`:""}
הערות פרשנים על היחידה (מכלי ההשוואה):
${scholarship&&scholarship.trim()?scholarship:"אין הערות פרשנים שמורות ליחידה זו"}

כתבי מסקנה מחקרית בעברית אקדמית (כ-150-250 מילה):
1. האם המושג מופיע (גלוי/נרמז) בדה"י, במקבילה, בשניהם או באף אחד.
2. עברי על השינויים הרלוונטיים (השמטה/תוספת/שינוי מילים/שינוי סדר) וקבעי כיצד כל אחד משפיע על נוכחות או משמעות המושג, עם דוגמאות ומספרי פסוקים.
3. שלבי את הערות הפרשנים לעיל לביסוס או העמקה.
4. סיימי במשפט מסכם: האם שינויי הכרוניסט חיזקו, החלישו, או לא שינו את ביטוי המושג ביחידה זו.`;
    try{ setConclusion(await aiCall(prompt,1300)); }catch(e){ setConclusion("⚠️ "+e.message); }
    setLoadC(false);
  }
  function saveFactual(){ setFactual(unit.id,conceptName,factual); setSavedF(true); setTimeout(()=>setSavedF(false),2000); }
  function saveConclusion(){ setCompareNote(unit.id,conceptName,conclusion); setSavedC(true); setTimeout(()=>setSavedC(false),2000); }

  return(
    <>
      {/* טבלת השוואת פרמטרים */}
      <div style={{background:"#1e293b",borderRadius:"10px",padding:"14px",border:"1px solid #334155",marginBottom:"14px"}}>
        <div style={{fontSize:"13px",fontWeight:"700",color:"#f1f5f9",marginBottom:"10px"}}>טבלת השוואה — {conceptName}</div>
        {validParams.length===0?(
          <div style={{fontSize:"12px",color:"#475569"}}>אין פרמטרים למושג זה (שדה סמנטי בלבד).</div>
        ):(
          <div style={{overflowX:"auto"}}>
            <table style={{width:"100%",borderCollapse:"collapse",fontSize:"12px"}}>
              <thead>
                <tr style={{color:"#64748b",fontSize:"11px",fontWeight:"700"}}>
                  <th style={{textAlign:"right",padding:"5px 6px",borderBottom:"1px solid #334155"}}>#</th>
                  <th style={{textAlign:"right",padding:"5px 6px",borderBottom:"1px solid #334155"}}>פרמטר</th>
                  <th style={{textAlign:"center",padding:"5px 6px",borderBottom:"1px solid #334155",color:"#93c5fd"}}>דה"י</th>
                  <th style={{textAlign:"center",padding:"5px 6px",borderBottom:"1px solid #334155",color:"#fbbf24"}}>מקבילה</th>
                </tr>
              </thead>
              <tbody>
                {validParams.map((p,i)=>{
                  const c=(ec.params||[])[i]||{}, s=(es.params||[])[i]||{};
                  const cell=(pe,col)=>{
                    const yes=pe.found===true,no=pe.found===false;
                    return <td style={{textAlign:"center",padding:"6px",borderBottom:"1px solid #1e293b"}}>
                      <span style={{color:yes?col:no?"#64748b":"#475569",fontWeight:"700"}}>{yes?"✓":no?"✗":"—"}</span>
                      {yes&&pe.verse&&<span style={{color:"#64748b",fontSize:"10px"}}> {pe.verse}</span>}
                    </td>;
                  };
                  return(
                    <tr key={i}>
                      <td style={{padding:"6px",borderBottom:"1px solid #1e293b",color:"#64748b"}}>{i+1}</td>
                      <td style={{padding:"6px",borderBottom:"1px solid #1e293b",color:"#cbd5e1",lineHeight:"1.5"}}>{paramText(p)}</td>
                      {cell(c,"#93c5fd")}
                      {cell(s,"#fbbf24")}
                    </tr>
                  );
                })}
              </tbody>
            </table>
          </div>
        )}
      </div>

      {/* אזור ג' — ניתוח השוואתי עובדתי */}
      <div style={{background:"#0f172a",borderRadius:"10px",padding:"14px",border:"1px solid #818cf844",marginBottom:"14px"}}>
        <div style={{fontSize:"13px",fontWeight:"700",color:"#818cf8",marginBottom:"10px"}}>📊 ניתוח השוואתי (עובדתי בלבד)</div>
        <button onClick={runFactual} disabled={loadF}
          style={{width:"100%",marginBottom:"10px",padding:"9px",borderRadius:"7px",border:"none",cursor:loadF?"wait":"pointer",background:loadF?"#1e293b":"#312e81",color:loadF?"#475569":"#a5b4fc",fontSize:"13px",fontWeight:"700"}}>
          {loadF?"⏳ מנתח...":factual?"🔄 הרץ ניתוח מחדש":"🤖 ניתוח השוואתי"}
        </button>
        <textarea value={factual} onChange={e=>setFactualText(e.target.value)} rows={6}
          placeholder="אילו פרמטרים נוספו / נגרעו / התחזקו — תיאור עובדתי..." style={{...S.input,resize:"vertical",lineHeight:"1.7"}}/>
        <button onClick={saveFactual}
          style={{width:"100%",marginTop:"10px",padding:"9px",borderRadius:"8px",border:"none",cursor:"pointer",background:savedF?"#16a34a":"#1d4ed8",color:"white",fontSize:"13px",fontWeight:"700"}}>{savedF?"✓ נשמר!":"💾 שמור"}</button>
      </div>

      {/* אזור ד' — מסקנה מחקרית */}
      <div style={{background:"#0f172a",borderRadius:"10px",padding:"14px",border:"1px solid #34d39944"}}>
        <div style={{fontSize:"13px",fontWeight:"700",color:"#34d399",marginBottom:"10px"}}>✍️ מסקנה מחקרית</div>
        <button onClick={runConclusion} disabled={loadC}
          style={{width:"100%",marginBottom:"10px",padding:"9px",borderRadius:"7px",border:"none",cursor:loadC?"wait":"pointer",background:loadC?"#1e293b":"#064e3b",color:loadC?"#475569":"#34d399",fontSize:"13px",fontWeight:"700"}}>
          {loadC?"⏳ כותב מסקנה...":conclusion?"🔄 כתבי מסקנה מחדש":"✍️ כתבי מסקנה"}
        </button>
        <textarea value={conclusion} onChange={e=>setConclusion(e.target.value)} rows={9}
          placeholder="המסקנה המחקרית תופיע כאן — ניתן לערוך לפני שמירה..." style={{...S.input,resize:"vertical",lineHeight:"1.8"}}/>
        <button onClick={saveConclusion}
          style={{width:"100%",marginTop:"10px",padding:"10px",borderRadius:"8px",border:"none",cursor:"pointer",background:savedC?"#16a34a":"#059669",color:"white",fontSize:"14px",fontWeight:"700"}}>{savedC?"✓ נשמר!":"💾 שמור מסקנה"}</button>
      </div>
    </>
  );
}

// ── מסך 2 — סביבת ההשוואה ──
function StageBCompare({unit,allConcepts,getE,getParams,getFactual,setFactual,getCompareNote,setCompareNote,onBack,onSummary,initConcept}){
  const [activeConcept,setActiveConcept]=useState(initConcept||null);
  React.useEffect(()=>{ if(initConcept) setActiveConcept(initConcept); },[initConcept]);
  const ec=activeConcept?(getE(unit.id,activeConcept,"chronicles")||{}):{};
  const es=activeConcept?(getE(unit.id,activeConcept,"source")||{}):{};
  const validParams=activeConcept?validParamDefs(getParams(activeConcept)):[];

  return(
    <div style={{display:"flex",flexDirection:"column",height:"calc(100vh - 46px)"}}>
      {/* כותרת + ניווט */}
      <div style={{flexShrink:0,padding:"10px 16px",borderBottom:"1px solid #334155",background:"#0f172a",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
        <button onClick={onBack} style={{padding:"5px 12px",borderRadius:"8px",border:"none",cursor:"pointer",background:"#334155",color:"#cbd5e1",fontSize:"12px",fontWeight:"600"}}>↩ בחירת יחידה</button>
        <div style={{fontSize:"15px",fontWeight:"bold",color:"#f1f5f9"}}>{unit.label} <span style={{fontSize:"12px",color:"#64748b"}}>· מסך 2 השוואה</span></div>
        <button onClick={onSummary} style={{padding:"5px 12px",borderRadius:"8px",border:"1px solid #475569",cursor:"pointer",background:"transparent",color:"#94a3b8",fontSize:"12px",fontWeight:"700"}}>סיכום היחידה →</button>
      </div>

      <div style={{flex:1,overflowY:"auto"}}>
        <div style={{padding:"14px 16px"}}>
          {/* אזור א' — שני הטקסטים המסומנים + מקרא */}
          <DiffPanel unit={unit}/>
        </div>

        <div style={{display:"grid",gridTemplateColumns:"1fr 240px",alignItems:"start"}}>
          {/* אזור ג'+ד' — מרכז */}
          <div style={{padding:"0 16px 24px"}}>
            {!activeConcept?(
              <div style={{padding:"40px",textAlign:"center",color:"#475569",fontSize:"14px"}}>בחרי מושג מהרשימה משמאל כדי לראות את ההשוואה</div>
            ):(
              <CompareConceptBlock key={unit.id+activeConcept} unit={unit} conceptName={activeConcept} validParams={validParams}
                ec={ec} es={es} esc={ec} scholarship={unit.scholarship}
                getFactual={getFactual} setFactual={setFactual} getCompareNote={getCompareNote} setCompareNote={setCompareNote}/>
            )}
          </div>

          {/* אזור ב' — רשימת מושגים משמאל */}
          <div style={{background:"#1e293b",borderRight:"1px solid #334155",minHeight:"100%",padding:"10px"}}>
            <div style={{fontSize:"11px",fontWeight:"700",color:"#64748b",marginBottom:"8px"}}>מושגים</div>
            {DIMS.map(dim=>{
              const cs=allConcepts.filter(c=>c.dimId===dim.id);
              if(!cs.length)return null;
              return(
                <div key={dim.id} style={{marginBottom:"10px"}}>
                  <div style={{fontSize:"10px",color:dim.color,fontWeight:"700",marginBottom:"4px"}}>{dim.label.split(":")[1]?dim.label.split(":")[1].trim():dim.label}</div>
                  {cs.map(c=>{
                    const hasConcl=!!(getCompareNote(unit.id,c.name)||"").trim();
                    const isActive=activeConcept===c.name;
                    return(
                      <button key={c.name} onClick={()=>setActiveConcept(c.name)}
                        style={{display:"flex",alignItems:"center",justifyContent:"space-between",width:"100%",textAlign:"right",padding:"6px 8px",borderRadius:"6px",border:"none",cursor:"pointer",marginBottom:"2px",fontSize:"12px",
                          background:isActive?dim.color+"33":"transparent",color:isActive?dim.color:hasConcl?"#34d399":"#94a3b8",
                          borderRight:isActive?`3px solid ${dim.color}`:"3px solid transparent",fontWeight:isActive?"700":"400"}}>
                        <span>{c.name}</span>{hasConcl&&<span style={{color:"#34d399",fontSize:"11px"}}>✓</span>}
                      </button>
                    );
                  })}
                </div>
              );
            })}
          </div>
        </div>
      </div>
    </div>
  );
}

// ── מסך 3 — סיכום היחידה הספרותית ──
function StageBSummary({unit,allUnits,allConcepts,getCompareNote,getUnitSummary,setUnitSummary,onBack,onCompareConcept,onNextUnit}){
  const saved=getUnitSummary(unit.id);
  const [patterns,setPatterns]=useState(saved.patterns||"");
  const [conclusion,setConclusion]=useState(saved.conclusion||"");
  const [notes,setNotes]=useState(saved.notes||"");
  const [changes,setChanges]=useState(saved.changes||{});
  const [loadP,setLoadP]=useState(false);
  const [loadC,setLoadC]=useState(false);
  const [flash,setFlash]=useState("");
  React.useEffect(()=>{ const s=getUnitSummary(unit.id); setPatterns(s.patterns||"");setConclusion(s.conclusion||"");setNotes(s.notes||"");setChanges(s.changes||{}); },[unit.id]);

  const conceptConcls=allConcepts.map(c=>({name:c.name,concl:(getCompareNote(unit.id,c.name)||"").trim()})).filter(x=>x.concl);
  const who=unit.character==="solomon"?"שלמה":"דוד";
  const CHANGE_OPTS=["—","התחזק","ללא שינוי","נוסף","נחלש","רק בדה\"י"];

  function persist(extra){ setUnitSummary(unit.id,{patterns,conclusion,notes,changes,...extra}); setFlash("✓ נשמר!"); setTimeout(()=>setFlash(""),2000); }
  function setChange(name,v){ setChanges(prev=>({...prev,[name]:v})); }

  async function runPatterns(){
    if(!conceptConcls.length){setPatterns("יש לכתוב מסקנות מחקריות למושגים במסך 2 לפני זיהוי דפוסים.");return;}
    setLoadP(true);
    const prompt=`אתה עוזר מחקר לתזה בתנ"ך. לפניך המסקנות המחקריות שאושרו עבור מושגים שונים ביחידה "${unit.label}" (דמות ${who}), בהשוואה בין דברי הימים למקבילה.

${conceptConcls.map(x=>`### ${x.name}\n${x.concl}`).join("\n\n")}

נתחי את הדפוסים המרכזיים העולים מכלל המסקנות. ציין בעברית, בארבעה סעיפים תמציתיים:
1. **מושגים שהתחזקו** אצל הכרוניסט.
2. **מושגים שכמעט לא השתנו**.
3. **מושגים המופיעים רק בדה"י** (נוספו).
4. **מושגים שנחלשו**.
לכל סעיף מנה את שמות המושגים הרלוונטיים בקצרה. ללא הקדמות.`;
    try{ setPatterns(await aiCall(prompt,1000)); }catch(e){ setPatterns("⚠️ "+e.message); }
    setLoadP(false);
  }
  async function runConclusion(){
    if(!conceptConcls.length){setConclusion("יש לכתוב מסקנות מחקריות למושגים במסך 2 לפני ניסוח מסקנת היחידה.");return;}
    setLoadC(true);
    const prompt=`אתה עוזר מחקר לתזה בתנ"ך. לפניך המסקנות המחקריות שאושרו עבור מושגים ביחידה "${unit.label}" (דמות ${who}), בהשוואה בין דברי הימים למקבילה (${unit.sourceRef||"שמואל/מלכים"}).

${conceptConcls.map(x=>`### ${x.name}\n${x.concl}`).join("\n\n")}

${patterns?`דפוסים מרכזיים שזוהו:\n${patterns}\n`:""}
נסחי פסקת סיכום מחקרית אחת ליחידה כולה (עברית אקדמית, כ-200-300 מילה). על המסקנה:
- לתאר כיצד עיצב הכרוניסט את דמות ${who} ביחידה זו לעומת המקבילה, על בסיס המגמות החוצות-מושגים.
- להתייחס במפורש לשינויי הכרוניסט (השמטות, תוספות, שינויים) וגם לתרומת הפרשנים שנשקלו בניתוח.
- לסיים בקביעה מסכמת על אופי העיצוב ביחידה.`;
    try{ setConclusion(await aiCall(prompt,1500)); }catch(e){ setConclusion("⚠️ "+e.message); }
    setLoadC(false);
  }
  function exportReport(){
    const lines=[];
    lines.push(`# סיכום יחידה — ${unit.label}`);
    if(unit.sourceRef)lines.push(`מקביל: ${unit.sourceRef}`);
    lines.push(`דמות: ${who}`,"");
    lines.push("## תמונת מצב");
    conceptConcls.forEach(x=>lines.push(`- ${x.name}: ${changes[x.name]&&changes[x.name]!=="—"?changes[x.name]:"מסקנה נכתבה"}`));
    lines.push("","## דפוסים מרכזיים",patterns||"—","","## מסקנת היחידה",conclusion||"—");
    if(notes.trim())lines.push("","## הערות מחקר של החוקרת",notes);
    lines.push("","## מסקנות לפי מושג");
    conceptConcls.forEach(x=>lines.push(`### ${x.name}`,x.concl,""));
    const blob=new Blob([lines.join("\n")],{type:"text/markdown"});
    const a=document.createElement("a");a.href=URL.createObjectURL(blob);a.download=`דוח_${unit.label}.md`;a.click();
    setFlash("✓ הדוח יוצא");setTimeout(()=>setFlash(""),2000);
  }

  return(
    <div style={{maxWidth:"900px",margin:"0 auto",padding:"20px 16px 60px"}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:"6px"}}>
        <button onClick={onBack} style={{padding:"5px 12px",borderRadius:"8px",border:"none",cursor:"pointer",background:"#334155",color:"#cbd5e1",fontSize:"12px",fontWeight:"600"}}>↩ חזרה להשוואה</button>
        {flash&&<span style={{color:"#34d399",fontSize:"12px",fontWeight:"700"}}>{flash}</span>}
      </div>
      <div style={{fontSize:"20px",fontWeight:"bold",color:"#f1f5f9",marginBottom:"2px"}}>סיכום היחידה — {unit.label}</div>
      <div style={{fontSize:"13px",color:"#64748b",marginBottom:"20px"}}>מסך 3 · {unit.sourceRef?`מקביל: ${unit.sourceRef} · `:""}דמות {who}</div>

      {/* חלק א' — תמונת מצב */}
      <div style={{background:"#1e293b",borderRadius:"10px",padding:"16px",border:"1px solid #334155",marginBottom:"16px"}}>
        <div style={{fontSize:"14px",fontWeight:"700",color:"#f1f5f9",marginBottom:"4px"}}>חלק א׳ — תמונת מצב</div>
        <div style={{fontSize:"11px",color:"#64748b",marginBottom:"10px"}}>טבלת ניווט — לחצי על מושג כדי לחזור אליו במסך ההשוואה.</div>
        {conceptConcls.length===0?(
          <div style={{fontSize:"12px",color:"#475569"}}>טרם נכתבו מסקנות מחקריות ליחידה זו.</div>
        ):(
          <table style={{width:"100%",borderCollapse:"collapse",fontSize:"13px"}}>
            <thead><tr style={{color:"#64748b",fontSize:"11px",fontWeight:"700"}}>
              <th style={{textAlign:"right",padding:"5px 6px",borderBottom:"1px solid #334155"}}>מושג</th>
              <th style={{textAlign:"right",padding:"5px 6px",borderBottom:"1px solid #334155"}}>שינוי בין מקבילה לדה"י</th>
              <th style={{textAlign:"center",padding:"5px 6px",borderBottom:"1px solid #334155"}}>סטטוס</th>
            </tr></thead>
            <tbody>
              {conceptConcls.map(x=>(
                <tr key={x.name}>
                  <td style={{padding:"6px",borderBottom:"1px solid #0f172a"}}>
                    <button onClick={()=>onCompareConcept(x.name)} style={{background:"none",border:"none",color:"#a5b4fc",cursor:"pointer",fontSize:"13px",fontWeight:"600",padding:0}}>{x.name}</button>
                  </td>
                  <td style={{padding:"6px",borderBottom:"1px solid #0f172a"}}>
                    <select value={changes[x.name]||"—"} onChange={e=>setChange(x.name,e.target.value)}
                      style={{...S.input,padding:"3px 6px",fontSize:"12px",width:"auto"}}>
                      {CHANGE_OPTS.map(o=><option key={o} value={o}>{o}</option>)}
                    </select>
                  </td>
                  <td style={{padding:"6px",borderBottom:"1px solid #0f172a",textAlign:"center",color:"#34d399"}}>✔</td>
                </tr>
              ))}
            </tbody>
          </table>
        )}
      </div>

      {/* חלק ב' — דפוסים מרכזיים */}
      <div style={{background:"#0f172a",borderRadius:"10px",padding:"16px",border:"1px solid #818cf844",marginBottom:"16px"}}>
        <div style={{fontSize:"14px",fontWeight:"700",color:"#818cf8",marginBottom:"10px"}}>חלק ב׳ — דפוסים מרכזיים</div>
        <button onClick={runPatterns} disabled={loadP}
          style={{width:"100%",marginBottom:"10px",padding:"9px",borderRadius:"7px",border:"none",cursor:loadP?"wait":"pointer",background:loadP?"#1e293b":"#312e81",color:loadP?"#475569":"#a5b4fc",fontSize:"13px",fontWeight:"700"}}>
          {loadP?"⏳ מזהה דפוסים...":patterns?"🔄 זהה דפוסים מחדש":"🤖 זהה דפוסים (על כל המסקנות)"}
        </button>
        <textarea value={patterns} onChange={e=>setPatterns(e.target.value)} rows={7} placeholder="דפוסים על פני כל המושגים..." style={{...S.input,resize:"vertical",lineHeight:"1.7"}}/>
      </div>

      {/* חלק ג' — מסקנת היחידה */}
      <div style={{background:"#0f172a",borderRadius:"10px",padding:"16px",border:"1px solid #34d39944",marginBottom:"16px"}}>
        <div style={{fontSize:"14px",fontWeight:"700",color:"#34d399",marginBottom:"10px"}}>חלק ג׳ — מסקנת היחידה</div>
        <button onClick={runConclusion} disabled={loadC}
          style={{width:"100%",marginBottom:"10px",padding:"9px",borderRadius:"7px",border:"none",cursor:loadC?"wait":"pointer",background:loadC?"#1e293b":"#064e3b",color:loadC?"#475569":"#34d399",fontSize:"13px",fontWeight:"700"}}>
          {loadC?"⏳ מנסח...":conclusion?"🔄 נסח מחדש":"✍️ נסח מסקנת יחידה (כרוניסט + פרשנים)"}
        </button>
        <textarea value={conclusion} onChange={e=>setConclusion(e.target.value)} rows={11} placeholder="מסקנת היחידה — טיוטת AI לעריכה..." style={{...S.input,resize:"vertical",lineHeight:"1.8",marginBottom:"14px"}}/>
        <label style={{...S.label}}>הערות מחקר של החוקרת (חופשי, ללא AI)</label>
        <textarea value={notes} onChange={e=>setNotes(e.target.value)} rows={4} placeholder="מחשבות, הפניות, נקודות להמשך..." style={{...S.input,resize:"vertical",lineHeight:"1.7"}}/>
      </div>

      {/* חלק ד' — שמירת התוצר */}
      <div style={{display:"flex",gap:"10px",flexWrap:"wrap"}}>
        <button onClick={()=>persist({})} style={{flex:1,minWidth:"140px",padding:"12px",borderRadius:"10px",border:"none",cursor:"pointer",background:"#059669",color:"white",fontSize:"14px",fontWeight:"700"}}>💾 שמור</button>
        <button onClick={exportReport} style={{padding:"12px 18px",borderRadius:"10px",border:"1px solid #475569",cursor:"pointer",background:"transparent",color:"#cbd5e1",fontSize:"13px",fontWeight:"700"}}>📄 ייצא לדוח</button>
        <button onClick={onNextUnit} style={{padding:"12px 18px",borderRadius:"10px",border:"1px dashed #475569",cursor:"pointer",background:"transparent",color:"#94a3b8",fontSize:"13px",fontWeight:"700"}}>עבור ליחידה הבאה ↩</button>
      </div>
    </div>
  );
}

// ── עוטף שלב ב' ──
function StageB({allUnits,allConcepts,getE,getParams,getCompareNote,setCompareNote,getFactual,setFactual,getUnitSummary,setUnitSummary,raw}){
  const [screen,setScreen]=useState("pick"); // pick | compare | summary
  const [unitId,setUnitId]=useState(null);
  const [jumpConcept,setJumpConcept]=useState(null);
  const unit=unitId?allUnits.find(u=>u.id===unitId):null;

  function isAnalyzed(uid,mode){
    return allConcepts.some(c=>{const e=getE(uid,c.name,mode);return e&&((e.explicit_note&&e.explicit_note.trim())||(e.params||[]).some(p=>p&&p.found!==null));});
  }
  function nextUnit(){
    if(!unit)return;
    const sameChar=allUnits.filter(u=>(u.character||"david")===(unit.character||"david"));
    const idx=sameChar.findIndex(u=>u.id===unit.id);
    const nxt=sameChar[idx+1];
    if(nxt){ setUnitId(nxt.id); setScreen("compare"); }
    else { setScreen("pick"); setUnitId(null); }
  }

  if(screen==="pick"||!unit)
    return <StageBPick allUnits={allUnits} allConcepts={allConcepts} getE={getE} isAnalyzed={isAnalyzed}
      onOpen={uid=>{setUnitId(uid);setScreen("compare");}} onSummary={uid=>{setUnitId(uid);setScreen("summary");}}/>;

  if(screen==="summary")
    return <StageBSummary unit={unit} allUnits={allUnits} allConcepts={allConcepts}
      getCompareNote={getCompareNote} getUnitSummary={getUnitSummary} setUnitSummary={setUnitSummary}
      onBack={()=>setScreen("compare")} onCompareConcept={name=>{setJumpConcept(name);setScreen("compare");}} onNextUnit={nextUnit}/>;

  return <StageBCompare key={unitId} unit={unit} allConcepts={allConcepts} getE={getE} getParams={getParams}
    getFactual={getFactual} setFactual={setFactual} getCompareNote={getCompareNote} setCompareNote={setCompareNote}
    initConcept={jumpConcept}
    onBack={()=>{setScreen("pick");setUnitId(null);setJumpConcept(null);}} onSummary={()=>setScreen("summary")}/>;
}


function App(){
  const [raw,setRaw]=useState({units:[],overrides:{},concepts:{},analysis:{},analysis_chronicles:{},analysis_source:{},customConcepts:[],compareNotes:{},compareFactual:{},unitSummary:{}});
  const [tab,setTab]=useState("home");
  // analysisMode: "chronicles" = ניתוח דה"י, "source" = ניתוח מקבילה
  const [analysisMode,setAnalysisMode]=useState("chronicles");
  const [activeUnit,setActiveUnit]=useState(null);
  const [initConcept,setInitConcept]=useState(null);
  const [msg,setMsg]=useState("");
  const [editConcept,setEditConcept]=useState(null);
  const [showAdd,setShowAdd]=useState(false);
  const [newName,setNewName]=useState("");
  const [newDim,setNewDim]=useState("d1");
  const [newParams,setNewParams]=useState(Array(10).fill(""));

  function flash(m){setMsg(m);setTimeout(()=>setMsg(""),m&&m.startsWith("⚠️")?6000:2000);}
  function cloudSave(){const d=window.__rawData||raw;fbSave(d).then(()=>flash("☁️ נשמר לענן")).catch(()=>flash("⚠️ השמירה לענן נכשלה — בדקי חיבור לאינטרנט!"));}

  function setData(fn){
    setRaw(prev=>{
      const next=typeof fn==="function"?fn(prev):fn;
      LS.save(next);
      if(gFH)fsWrite(next).catch(()=>{});
      window.__rawData = next;
      return next;
    });
  }

  useEffect(()=>{ window.__rawData = raw; },[raw]);

  useEffect(()=>{
    let base={units:[],overrides:{},concepts:{},analysis:{},analysis_chronicles:{},analysis_source:{},customConcepts:[],compareNotes:{},compareFactual:{},unitSummary:{}};
    Object.keys(DEFAULT_CONCEPTS).forEach(name=>{
      base.concepts[name]={params: DEFAULT_CONCEPTS[name].params};
    });
    fbLoad(fbData=>{
      if(fbData&&fbData.units&&fbData.units.length>0){
        const merged={...base,...fbData,concepts:{...base.concepts,...(fbData.concepts||{})}};
        if(fbData.analysis&&Object.keys(fbData.analysis).length>0&&(!fbData.analysis_chronicles||Object.keys(fbData.analysis_chronicles).length===0)){
          merged.analysis_chronicles=fbData.analysis;
        }
        setRaw(merged);
        flash("✓ נטען מהענן");
      } else {
        // Firebase empty — try localStorage fallback
        const d=LS.load();
        if(d&&d.units&&d.units.length>0){
          setRaw({...base,...d,concepts:{...base.concepts,...(d.concepts||{})}});
        } else {
          setRaw(base);
        }
      }
    });
  },[]);

  async function loadFile(){
    const d=await fsOpen();
    if(!d){alert("לא ניתן לקרוא");return;}
    const defaultConcepts={};
    Object.keys(DEFAULT_CONCEPTS).forEach(name=>{
      defaultConcepts[name]={params: DEFAULT_CONCEPTS[name].params};
    });
    const existingAnalysis=ALS.load()||raw.analysis||{};
    const existingChr=ACLS.load()||raw.analysis_chronicles||{};
    const existingSrc=ASLS.load()||raw.analysis_source||{};
    const existingConcepts=CLS.load()||raw.concepts||{};
    const merged={
      ...d,
      concepts:{...defaultConcepts,...(d.concepts||{}),...existingConcepts},
      analysis:{...existingAnalysis,...(d.analysis||{})},
      analysis_chronicles:{...existingChr,...(d.analysis_chronicles||{})},
      analysis_source:{...existingSrc,...(d.analysis_source||{})}
    };
    // Migrate old analysis to analysis_chronicles if needed
    if(merged.analysis&&Object.keys(merged.analysis).length>0&&(!merged.analysis_chronicles||Object.keys(merged.analysis_chronicles).length===0)){
      merged.analysis_chronicles=merged.analysis;
    }
    console.log("after merge, units count:", merged.units?.length);
    console.log("setRaw called with:", merged);
    setRaw(merged);
    LS.save(merged);
    fbSave(merged);
    flash("✓ נטען ונשמר בענן");
  }
  async function saveFile(){
    if(!gFH){const ok=await fsSave("chronicles_data.json");if(!ok)return;}
    const ok=await fsWrite(raw);
    ok?flash("✓ נשמר"):alert("שגיאה");
  }
  async function saveAs(){
    gFH=null;
    const ok=await fsSave("chronicles_data.json");if(!ok)return;
    await fsWrite(raw); flash("✓ נשמר");
  }

  // All concepts
  const allConcepts=useMemo(()=>{
    const r=[];
    DIMS.forEach(d=>d.concepts.forEach(name=>r.push({name,dimId:d.id})));
    (raw.customConcepts||[]).forEach(c=>r.push({name:c.name,dimId:c.dimId}));
    return r;
  },[raw.customConcepts]);

  // All units from app1
  const allUnits=useMemo(()=>{
    if(!(raw.units||[]).length)return [];
    return (raw.units||[]).map(u=>({
      id:u.id,label:u.name||u.chapter||"",character:u.character||"",
      chroniclesText:u.chroniclesText||"",sourceText:u.sourceText||"",
      sourceRef:u.sourceRef||"",scholarship:u.scholarship||"",
    }));
  },[raw.units]);

  function getE(uid,cname,mode){
    const store=mode==="source"?"analysis_source":"analysis_chronicles";
    return raw[store]?.[uid]?.[cname]||null;
  }
  const fbSaveTimer = React.useRef(null);
  const pendingPatchFns = React.useRef([]); // תור patch-ים שמצטברים בחלון ה-debounce, ומוחלים כולם יחד על נתון טרי מהשרת
  function queuePatch(patchFn){
    pendingPatchFns.current.push(patchFn);
    if(fbSaveTimer.current) clearTimeout(fbSaveTimer.current);
    fbSaveTimer.current = setTimeout(flushPatches, 2000);
  }
  function flushPatches(){
    const fns = pendingPatchFns.current;
    pendingPatchFns.current = [];
    if(!fns.length) return;
    fbSaveMerge(serverData => fns.reduce((d,fn)=>fn(d), serverData))
      .then(merged=>{ setRaw(merged); window.__rawData = merged; })
      .catch(()=>flash("⚠️ שמירה אוטומטית לענן נכשלה — בדקי חיבור ונסי לשמור שינויים שוב!"));
  }
  function setE(uid,cname,entry,mode){
    const store=mode==="source"?"analysis_source":"analysis_chronicles";
    setRaw(prev=>{
      const updated={...prev,[store]:{...prev[store],[uid]:{...(prev[store]?.[uid]||{}),[cname]:entry}}};
      window.__rawData = updated;
      LS.save(updated);
      return updated;
    });
    queuePatch(d=>({...d,[store]:{...d[store],[uid]:{...(d[store]?.[uid]||{}),[cname]:entry}}}));
  }
  function getParams(cname){const fromRaw=(raw.concepts?.[cname]?.params)||[];return fromRaw.length>0?fromRaw:(DEFAULT_CONCEPTS[cname]?.params)||[];}

  function getCompareNote(uid,cname){ return raw.compareNotes?.[uid]?.[cname]||""; }
  function setCompareNote(uid,cname,text){
    setRaw(prev=>{
      const updated={...prev,compareNotes:{...prev.compareNotes,[uid]:{...(prev.compareNotes?.[uid]||{}),[cname]:text}}};
      window.__rawData = updated;
      LS.save(updated);
      return updated;
    });
    queuePatch(d=>({...d,compareNotes:{...d.compareNotes,[uid]:{...(d.compareNotes?.[uid]||{}),[cname]:text}}}));
  }

  // ── שלב ב': ניתוח השוואתי עובדתי (compareFactual) ──
  function getFactual(uid,cname){ return raw.compareFactual?.[uid]?.[cname]||""; }
  function setFactual(uid,cname,text){
    setRaw(prev=>{
      const updated={...prev,compareFactual:{...prev.compareFactual,[uid]:{...(prev.compareFactual?.[uid]||{}),[cname]:text}}};
      window.__rawData=updated; LS.save(updated); return updated;
    });
    queuePatch(d=>({...d,compareFactual:{...d.compareFactual,[uid]:{...(d.compareFactual?.[uid]||{}),[cname]:text}}}));
  }
  // ── שלב ב': סיכום יחידה (unitSummary) ──
  function getUnitSummary(uid){ return raw.unitSummary?.[uid]||{patterns:"",conclusion:"",notes:"",changes:{}}; }
  function setUnitSummary(uid,obj){
    setRaw(prev=>{
      const updated={...prev,unitSummary:{...prev.unitSummary,[uid]:obj}};
      window.__rawData=updated; LS.save(updated); return updated;
    });
    queuePatch(d=>({...d,unitSummary:{...d.unitSummary,[uid]:obj}}));
  }



  // Progress - based on current analysis mode
  const prog=useMemo(()=>{
    const tot=allUnits.length*allConcepts.length;
    let doneChr=0,doneSrc=0;
    allUnits.forEach(u=>allConcepts.forEach(c=>{
      const ec=getE(u.id,c.name,"chronicles");
      if(ec&&(ec.explicit_note||(ec.params||[]).some(p=>p.found!==null)))doneChr++;
      const es=getE(u.id,c.name,"source");
      if(es&&(es.explicit_note||(es.params||[]).some(p=>p.found!==null)))doneSrc++;
    }));
    return{tot,doneChr,doneSrc,pctChr:tot?Math.round(doneChr/tot*100):0,pctSrc:tot?Math.round(doneSrc/tot*100):0};
  },[raw.analysis_chronicles,raw.analysis_source,allUnits,allConcepts]);

  function saveConcept(name,params,sem){
    setRaw(prev=>{
      const updated={...prev,
        concepts:{...prev.concepts,[name]:{...(prev.concepts?.[name]||{}),params,sem}},
        customSemantic:{...(prev.customSemantic||{}),...(sem?{[name]:sem}:{})}
      };
      window.__rawData = updated;
      LS.save(updated);
      return updated;
    });
    setEditConcept(null);
    fbSaveMerge(d=>({...d,
      concepts:{...d.concepts,[name]:{...(d.concepts?.[name]||{}),params,sem}},
      customSemantic:{...(d.customSemantic||{}),...(sem?{[name]:sem}:{})}
    }))
      .then(merged=>{ setRaw(merged); window.__rawData=merged; flash("✓ נשמר בענן"); })
      .catch(()=>flash("⚠️ השמירה לענן נכשלה — בדקי חיבור לאינטרנט ושמרי שוב!"));
  }
  function addConcept(){
    if(!newName.trim())return;
    const cname=newName.trim();
    setData(prev=>{
      const updated={...prev,
        customConcepts:[...(prev.customConcepts||[]),{name:cname,dimId:newDim}],
        concepts:{...prev.concepts,[cname]:{params:newParams}}
      };
      CLS.save(updated.concepts);
      return updated;
    });
    fbSaveMerge(d=>({...d,
      customConcepts:[...(d.customConcepts||[]).filter(c=>c.name!==cname),{name:cname,dimId:newDim}],
      concepts:{...d.concepts,[cname]:{params:newParams}}
    }))
      .then(merged=>{ setRaw(merged); window.__rawData=merged; flash("✓ נוסף ונשמר בענן"); })
      .catch(()=>flash("⚠️ המושג נוסף מקומית אך השמירה לענן נכשלה — בדקי חיבור ונסי שוב!"));
    setNewName(""); setNewParams(Array(10).fill("")); setShowAdd(false);
  }

  const dim4concept=(cname)=>DIMS.find(d=>d.concepts.includes(cname))||DIMS.find(d=>d.id===(raw.customConcepts||[]).find(c=>c.name===cname)?.dimId)||DIMS[0];

  function exportConcepts(){
    const exportData={concepts:raw.concepts||{},...(raw.customSemantic?{customSemantic:raw.customSemantic}:{})};
    const blob=new Blob([JSON.stringify(exportData,null,2)],{type:"application/json"});
    const a=document.createElement("a");a.href=URL.createObjectURL(blob);a.download="chronicles_concepts_backup.json";a.click();
    flash("✓ קריטריונים יוצאו");
  }
  function exportAll(){
    const all={};
    for(let i=0;i<localStorage.length;i++){const k=localStorage.key(i);all[k]=localStorage.getItem(k);}
    const blob=new Blob([JSON.stringify(all,null,2)],{type:"application/json"});
    const a=document.createElement("a");a.href=URL.createObjectURL(blob);a.download="chronicles_full_backup.json";a.click();
    flash("✓ גיבוי מלא יוצא");
  }
  function importAll(data){
    try{
      Object.entries(data).forEach(([k,v])=>localStorage.setItem(k,v));
      flash("✓ נתונים שוחזרו — טוען מחדש...");
      setTimeout(()=>window.location.reload(),800);
    }catch(e){alert("שגיאה בייבוא: "+e.message);}
  }
  function importConcepts(data){
    setData(prev=>{
      const importedConcepts=data.concepts||data;
      const updated={...prev,concepts:{...prev.concepts,...importedConcepts}};
      if(data.customSemantic)updated.customSemantic={...(prev.customSemantic||{}),...data.customSemantic};
      CLS.save(updated.concepts);
      return updated;
    });
    flash("✓ קריטריונים שוחזרו");
  }

  return(
    <div dir="rtl" style={{minHeight:"100vh",background:"#0f172a"}}>
      <Header msg={msg} tab={tab} setTab={setTab} analysisMode={analysisMode} setAnalysisMode={setAnalysisMode}/>

      {tab==="home"&&<HomeTab allUnits={allUnits} allConcepts={allConcepts} prog={prog} raw={raw} setTab={setTab} setEditConcept={setEditConcept} setShowAdd={setShowAdd} getE={getE} dim4concept={dim4concept} getParams={getParams} setInitConcept={setInitConcept} analysisMode={analysisMode} setAnalysisMode={setAnalysisMode}/>}
      {tab==="stagea"&&<StageA allUnits={allUnits} allConcepts={allConcepts} getE={getE} setE={setE} getParams={getParams} dim4concept={dim4concept} raw={raw}/>}
      {tab==="stageb"&&<StageB allUnits={allUnits} allConcepts={allConcepts} getE={getE} getParams={getParams} getCompareNote={getCompareNote} setCompareNote={setCompareNote} getFactual={getFactual} setFactual={setFactual} getUnitSummary={getUnitSummary} setUnitSummary={setUnitSummary} raw={raw}/>}
      {tab==="byunit"&&<ByUnitTab allUnits={allUnits} allConcepts={allConcepts} raw={raw} getE={getE} setE={setE} getParams={getParams} dim4concept={dim4concept} onUnitSelect={setActiveUnit} analysisMode={analysisMode}/>}
      {tab==="byconcept"&&<ByConceptTab allUnits={allUnits} allConcepts={allConcepts} raw={raw} getE={getE} setE={setE} getParams={getParams} dim4concept={dim4concept} initConcept={initConcept} setInitConcept={setInitConcept} setEditConcept={setEditConcept} analysisMode={analysisMode}/>}
      {tab==="matrix"&&<MatrixTab allUnits={allUnits} allConcepts={allConcepts} raw={raw} getE={getE} dim4concept={dim4concept} analysisMode={analysisMode}/>}
      {tab==="charts"&&<ChartsTab allUnits={allUnits} allConcepts={allConcepts} raw={raw} getE={getE} dim4concept={dim4concept} analysisMode={analysisMode}/>}
      {tab==="compare"&&<CompareTab allUnits={allUnits} allConcepts={allConcepts} getE={getE} getParams={getParams} getCompareNote={getCompareNote} setCompareNote={setCompareNote}/>}
      {tab==="synthesis"&&<SynthesisTab allUnits={allUnits} allConcepts={allConcepts} getE={getE} analysisMode={analysisMode}/>}

      {editConcept&&(()=>{
        const dim=dim4concept(editConcept);
        return(
        <Modal title={`✎ עריכת מושג — ${editConcept} | ${dim?.label||""}`} onClose={()=>setEditConcept(null)}>
          <ConceptParamsEditor key={editConcept+JSON.stringify(getParams(editConcept))} name={editConcept} params={getParams(editConcept)} semData={raw.customSemantic?.[editConcept]} dimLabel={dim?.label} onSave={saveConcept} onClose={()=>setEditConcept(null)}/>
        </Modal>
        );
      })()}
      {showAdd&&(
        <Modal title="הוספת מושג חדש" onClose={()=>setShowAdd(false)}>
          <label style={S.label}>שם</label>
          <input value={newName} onChange={e=>setNewName(e.target.value)} style={{...S.input,marginBottom:"10px"}}/>
          <label style={S.label}>ממד</label>
          <select value={newDim} onChange={e=>setNewDim(e.target.value)} style={{...S.input,marginBottom:"10px"}}>
            {DIMS.map(d=><option key={d.id} value={d.id}>{d.label}</option>)}
          </select>
          <label style={S.label}>פרמטרים</label>
          {newParams.map((p,i)=><input key={i} value={p} onChange={e=>{const a=[...newParams];a[i]=e.target.value;setNewParams(a);}} placeholder={`פרמטר ${i+1}`} style={{...S.input,marginBottom:"5px"}}/>)}
          <button onClick={addConcept} style={{...S.btnPrimary,marginTop:"10px"}}>✓ הוסף</button>
        </Modal>
      )}
    </div>
  );
}

function ConceptParamsEditor({name,params,semData,onSave,onClose}){
  const existing=semData||SEMANTIC[name]||{pos:"",neg:""};
  const [semPos,setSemPos]=useState(existing.pos||"");
  const [semNeg,setSemNeg]=useState(existing.neg||"");
  const [ps,setPs]=useState(()=>{
    const a=[...(params||[])];
    while(a.length<10)a.push({q:"",ind:""});
    return a.map(p=>typeof p==="object"&&p!==null?{q:p.q||"",ind:p.ind||""}:{q:String(p||""),ind:""});
  });
  function updQ(i,v){const a=[...ps];a[i]={...a[i],q:v};setPs(a);}
  function updI(i,v){const a=[...ps];a[i]={...a[i],ind:v};setPs(a);}
  return(
    <div>
      {/* Semantic fields */}
      <div style={{marginBottom:"14px",background:"#0f172a",borderRadius:"7px",padding:"12px",border:"1px solid #334155"}}>
        <div style={{fontSize:"11px",color:"#34d399",fontWeight:"700",marginBottom:"8px"}}>שדות סמנטיים</div>
        <label style={{...S.label,color:"#86efac"}}>שדה סמנטי חיובי</label>
        <textarea value={semPos} onChange={e=>setSemPos(e.target.value)} rows={2}
          placeholder="מילים מהשדה החיובי, מופרדות בפסיק..."
          style={{...S.input,resize:"vertical",fontSize:"12px",marginBottom:"8px"}}/>
        <label style={{...S.label,color:"#fca5a5"}}>שדה סמנטי שלילי (הפוך)</label>
        <textarea value={semNeg} onChange={e=>setSemNeg(e.target.value)} rows={2}
          placeholder="מילים מהשדה השלילי, מופרדות בפסיק..."
          style={{...S.input,resize:"vertical",fontSize:"12px"}}/>
      </div>
      {/* Parameters */}
      <div style={{fontSize:"11px",color:"#818cf8",fontWeight:"700",marginBottom:"8px"}}>10 פרמטרים ואינדיקטורים</div>
      {ps.map((p,i)=>(
        <div key={i} style={{marginBottom:"10px",background:"#0f172a",borderRadius:"7px",padding:"10px",border:"1px solid #334155"}}>
          <div style={{fontSize:"10px",color:"#64748b",fontWeight:"700",marginBottom:"5px"}}>פרמטר {i+1}</div>
          <input value={p.q} onChange={e=>updQ(i,e.target.value)} placeholder="שאלה אנליטית..." style={{...S.input,marginBottom:"5px"}}/>
          <textarea value={p.ind} onChange={e=>updI(i,e.target.value)} placeholder="אינדיקטור בטקסט..." rows={2} style={{...S.input,resize:"vertical",fontSize:"12px",color:"#94a3b8"}}/>
        </div>
      ))}
      <div style={{display:"flex",gap:"8px",marginTop:"10px"}}>
        <button onClick={()=>onSave(name,ps,{pos:semPos,neg:semNeg})} style={S.btnPrimary}>✓ שמור</button>
        <button onClick={onClose} style={{...S.btnPrimary,background:"#334155"}}>ביטול</button>
      </div>
    </div>
  );
}

// ── By Unit Tab ───────────────────────────────────────────────────────
function ByUnitTab({allUnits,allConcepts,raw,getE,setE,getParams,dim4concept,onUnitSelect,analysisMode}){
  const [uid,setUid]=useState(null);
  const [activeConcept,setActiveConcept]=useState(null);
  const unit=allUnits.find(u=>u.id===uid);
  const modeColor=analysisMode==="chronicles"?"#93c5fd":"#fbbf24";
  const modeLabel=analysisMode==="chronicles"?'📘 ניתוח דה"י':'📙 ניתוח מקבילות';
  const unitText=analysisMode==="chronicles"?unit?.chroniclesText:unit?.sourceText;
  const sourceText=analysisMode==="chronicles"?unit?.sourceText:unit?.chroniclesText;
  const done=unit?allConcepts.filter(c=>{const e=getE(unit.id,c.name,analysisMode);return e&&(e.explicit_note||(e.params||[]).some(p=>p.found!==null));}).length:0;

  function handleUnitSelect(u){setUid(u.id);setActiveConcept(null);onUnitSelect&&onUnitSelect(u);}

  return(
    <div style={{display:"grid",gridTemplateColumns:"180px 1fr 260px",height:"calc(100vh - 46px)"}}>
      {/* Sidebar — יחידות */}
      <div style={{background:"#1e293b",borderLeft:"1px solid #334155",overflowY:"auto",padding:"10px"}}>
        <div style={{fontSize:"11px",fontWeight:"700",color:modeColor,marginBottom:"8px"}}>{modeLabel}</div>
        {["david","solomon"].map(ch=>{
          const us=allUnits.filter(u=>u.character===ch||(ch==="david"&&!u.character));
          if(!us.length)return null;
          return(
            <div key={ch} style={{marginBottom:"10px"}}>
              <div style={{fontSize:"10px",color:ch==="david"?"#93c5fd":"#d8b4fe",fontWeight:"700",marginBottom:"4px"}}>{ch==="david"?"👑 דוד":"👑 שלמה"}</div>
              {us.map(u=>{
                const d=allConcepts.filter(c=>{const e=getE(u.id,c.name,analysisMode);return e&&(e.explicit_note||(e.params||[]).some(p=>p.found!==null));}).length;
                return(
                  <button key={u.id} onClick={()=>handleUnitSelect(u)}
                    style={{display:"block",width:"100%",textAlign:"right",padding:"6px 8px",borderRadius:"6px",border:"none",cursor:"pointer",marginBottom:"2px",fontSize:"11px",
                      background:uid===u.id?"#334155":"transparent",color:uid===u.id?"#f1f5f9":"#64748b",
                      borderRight:uid===u.id?`3px solid ${modeColor}`:"3px solid transparent"}}>
                    <span>{u.label}</span>
                    {d>0&&<span style={{color:modeColor,fontSize:"10px",float:"left"}}>{d}</span>}
                  </button>
                );
              })}
            </div>
          );
        })}
      </div>

      {/* מרכז — טקסט קבוע + עורך מושג */}
      <div style={{display:"flex",flexDirection:"column",height:"calc(100vh - 46px)",overflow:"hidden"}}>
        {!unit?(
          <div style={{padding:"60px",textAlign:"center",color:"#334155"}}>בחרי יחידה מהרשימה</div>
        ):(
          <>
            {/* טקסט קבוע */}
            <div style={{flexShrink:0,padding:"12px 16px",borderBottom:"1px solid #334155"}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:"8px"}}>
                <div>
                  <div style={{fontSize:"15px",fontWeight:"bold",color:"#f1f5f9"}}>{unit.label}</div>
                  <div style={{fontSize:"11px",color:"#64748b"}}>{unit.sourceRef&&`מקביל: ${unit.sourceRef}`}</div>
                </div>
                <div style={{textAlign:"center"}}>
                  <div style={{fontSize:"18px",fontWeight:"bold",color:modeColor}}>{done}/{allConcepts.length}</div>
                  <div style={{fontSize:"10px",color:"#64748b"}}>נבדקו</div>
                </div>
              </div>
              <div style={{background:"#1e293b",border:`1px solid ${modeColor}44`,borderRadius:"8px",padding:"10px 14px",fontSize:"13px",lineHeight:"2",color:"#e2e8f0",direction:"rtl",maxHeight:"200px",overflowY:"auto"}}>
                <div style={{fontSize:"10px",fontWeight:"700",color:modeColor,marginBottom:"4px"}}>{analysisMode==="chronicles"?'📘 דברי הימים':'📙 מקבילה'}</div>
                {unitText||<span style={{color:"#475569"}}>אין טקסט</span>}
              </div>
            </div>
            {/* עורך מושג פתוח */}
            <div style={{flex:1,overflowY:"auto",padding:"12px 16px"}}>
              {!activeConcept?(
                <div style={{padding:"40px",textAlign:"center",color:"#334155",fontSize:"13px"}}>בחרי מושג מהרשימה לעריכה</div>
              ):(()=>{
                const c=allConcepts.find(a=>a.name===activeConcept);
                const dim=c?dim4concept(c.name):null;
                return(
                  <div>
                    <div style={{fontSize:"13px",fontWeight:"700",color:dim?.color||"#818cf8",marginBottom:"10px"}}>✎ {activeConcept}</div>
                    <ConceptRow key={activeConcept+uid} conceptName={activeConcept} dimColor={dim?.color||"#818cf8"} params={getParams(activeConcept)} entry={getE(unit.id,activeConcept,analysisMode)} onChange={e=>{setE(unit.id,activeConcept,e,analysisMode);}} unitText={unitText} sourceText={sourceText} sourceRef={unit.sourceRef} scholarship={unit.scholarship} analysisMode={analysisMode} customSemantic={raw.customSemantic||{}} character={unit.character||"david"} defaultOpen={true}/>
                  </div>
                );
              })()}
            </div>
          </>
        )}
      </div>

      {/* ימין — רשימת מושגים */}
      <div style={{background:"#1e293b",borderRight:"1px solid #334155",overflowY:"auto",padding:"10px"}}>
        {!unit?(null):(
          <>
            <div style={{fontSize:"11px",fontWeight:"700",color:"#64748b",marginBottom:"8px"}}>מושגים</div>
            {DIMS.map(dim=>{
              const cs=allConcepts.filter(c=>c.dimId===dim.id);
              if(!cs.length)return null;
              return(
                <div key={dim.id} style={{marginBottom:"10px"}}>
                  <div style={{fontSize:"10px",color:dim.color,fontWeight:"700",marginBottom:"4px"}}>{dim.label.split(":")[1]?.trim()||dim.label}</div>
                  {cs.map(c=>{
                    const e=getE(unit.id,c.name,analysisMode);
                    const done=e&&(e.explicit_note||(e.params||[]).some(p=>p.found!==null));
                    const isActive=activeConcept===c.name;
                    return(
                      <button key={c.name} onClick={()=>setActiveConcept(isActive?null:c.name)}
                        style={{display:"block",width:"100%",textAlign:"right",padding:"5px 8px",borderRadius:"5px",border:"none",cursor:"pointer",marginBottom:"2px",fontSize:"11px",
                          background:isActive?dim.color+"33":"transparent",
                          color:isActive?dim.color:done?"#34d399":"#64748b",
                          borderRight:isActive?`3px solid ${dim.color}`:"3px solid transparent",
                          fontWeight:isActive?"700":"400"}}>
                        {done&&!isActive&&<span style={{color:"#34d399",marginLeft:"4px"}}>✓</span>}
                        {c.name}
                      </button>
                    );
                  })}
                </div>
              );
            })}
          </>
        )}
      </div>
    </div>
  );
}

function ConceptRow({conceptName,dimColor,params,entry,onChange,unitText,sourceText,sourceRef,scholarship,analysisMode,customSemantic,character,defaultOpen}){
  const [open,setOpen]=useState(defaultOpen||false);
  const e=entry;
  const hasE=!!(e?.explicit_note?.trim());
  const implN=(e?.params||[]).filter(p=>p.found===true).length;
  const done=hasE||implN>0;
  const modeColor=analysisMode==="chronicles"?"#93c5fd":"#fbbf24";
  return(
    <div style={{marginBottom:"5px"}}>
      <button onClick={()=>setOpen(o=>!o)}
        style={{width:"100%",display:"flex",justifyContent:"space-between",alignItems:"center",padding:"8px 12px",borderRadius:"7px",border:`1px solid ${open?dimColor+"66":"#334155"}`,background:open?"#263148":"#1e293b",cursor:"pointer",textAlign:"right"}}>
        <div style={{display:"flex",alignItems:"center",gap:"7px"}}>
          <span style={{fontSize:"13px",color:done?"#f1f5f9":"#475569",fontWeight:done?"600":"400"}}>{conceptName}</span>
          {hasE&&<span style={{background:"#166534",color:"#86efac",padding:"1px 7px",borderRadius:"9px",fontSize:"10px"}}>גלוי</span>}
          {implN>0&&<span style={{background:"#1e3a5f",color:modeColor,padding:"1px 7px",borderRadius:"9px",fontSize:"10px"}}>נרמז: {implN}</span>}
        </div>
        <span style={{color:"#475569",fontSize:"11px"}}>{open?"▲":"▼"}</span>
      </button>
      {open&&(
        <div style={{background:"#1e293b",border:`1px solid ${dimColor}33`,borderTop:"none",borderRadius:"0 0 7px 7px",padding:"14px"}}>
          <EntryEditor unitId={null} conceptName={conceptName} conceptParams={params} entry={entry} onChange={onChange} unitText={unitText} sourceText={sourceText} sourceRef={sourceRef} scholarship={scholarship} analysisMode={analysisMode} customSemantic={customSemantic||{}} character={character}/>
        </div>
      )}
    </div>
  );
}

              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:"14px"}}>

                    <div style={{fontSize:"10px",color:"#64748b"}}>יחידות</div>
                  </div>
                  <button onClick={()=>setEditConcept(cname)}
                    style={{background:"#1e293b",border:`1px solid ${dim?.color||"#818cf8"}44`,borderRadius:"8px",padding:"6px 12px",cursor:"pointer",color:dim?.color||"#818cf8",fontSize:"11px",fontWeight:"700"}}
                    title="ערוך פרמטרים ואינדיקטורים">

                  </button>

              {["david","solomon"].map(ch=>{
                const us=allUnits.filter(u=>u.character===ch||(ch==="david"&&!u.character));

                            <div style={{display:"flex",alignItems:"center",gap:"7px"}}>
