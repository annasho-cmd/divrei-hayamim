}

// ── Matrix Tab ────────────────────────────────────────────────────────
function MatrixTab({allUnits,allConcepts,raw,getE,dim4concept,analysisMode}){
  const [ch,setCh]=useState("all");
  const units=ch==="all"?allUnits:allUnits.filter(u=>u.character===ch||(ch==="david"&&!u.character));
  const modeColor=analysisMode==="chronicles"?"#93c5fd":"#fbbf24";
  const modeLabel=analysisMode==="chronicles"?'📘 דה"י':'📙 מקבילות';
  function cellSt(uid,cname){
    const e=getE(uid,cname,analysisMode);if(!e)return"empty";
    const hE=!!(e.explicit_note?.trim()),iN=(e.params||[]).filter(p=>p.found===true).length>0;
    if(hE&&iN)return"both";if(hE)return"explicit";if(iN)return"implicit";
    if((e.params||[]).some(p=>p.found===false))return"checked";return"empty";
  }
  const C={both:"#34d399",explicit:"#86efac",implicit:"#818cf8",checked:"#334155",empty:"#1e293b"};
  return(
    <div style={{padding:"16px",overflowX:"auto"}}>
      <div style={{display:"flex",gap:"10px",marginBottom:"14px",alignItems:"center",flexWrap:"wrap"}}>
        <div style={{fontSize:"15px",fontWeight:"bold",color:modeColor}}>מטריצה — {modeLabel}</div>
        {[["all","הכל"],["david","דוד"],["solomon","שלמה"]].map(([v,l])=>(
          <button key={v} onClick={()=>setCh(v)} style={{padding:"3px 10px",borderRadius:"12px",border:"none",cursor:"pointer",fontSize:"12px",background:ch===v?"#818cf8":"#334155",color:ch===v?"white":"#94a3b8"}}>{l}</button>
        ))}
        <div style={{display:"flex",gap:"8px",flexWrap:"wrap"}}>
          {[["both","גלוי+נרמז"],["explicit","גלוי"],["implicit","נרמז"],["checked","נבדק"],["empty","לא נבדק"]].map(([k,l])=>(
            <span key={k} style={{display:"flex",alignItems:"center",gap:"3px",fontSize:"10px",color:"#64748b"}}>
              <span style={{width:"10px",height:"10px",background:C[k],borderRadius:"2px",border:k==="empty"?"1px solid #334155":"none",display:"inline-block"}}/>
              {l}
            </span>
          ))}
        </div>
      </div>
      <div style={{overflowX:"auto"}}>
        <table style={{borderCollapse:"collapse",fontSize:"11px"}}>
          <thead>
            <tr>
              <th style={{padding:"5px 8px",background:"#1e293b",color:"#64748b",textAlign:"right",position:"sticky",right:0,minWidth:"150px",borderBottom:"1px solid #334155",zIndex:2}}>יחידה</th>
              {DIMS.map(dim=>allConcepts.filter(c=>c.dimId===dim.id).map(c=>(
                <th key={c.name} style={{padding:"4px 3px",background:"#1e293b",color:dim.color,textAlign:"center",borderBottom:"1px solid #334155",minWidth:"44px",writingMode:"vertical-rl",height:"70px"}}>{c.name}</th>
              )))}
            </tr>
          </thead>
          <tbody>
            {units.map((u,ri)=>(
              <tr key={u.id} style={{background:ri%2===0?"#0f172a":"#111827"}}>
                <td style={{padding:"4px 8px",color:u.character==="solomon"?"#d8b4fe":"#93c5fd",position:"sticky",right:0,background:ri%2===0?"#0f172a":"#111827",borderBottom:"1px solid #1e293b",fontSize:"11px",maxWidth:"180px",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap",zIndex:1}}>
                  {u.label}
                </td>
                {DIMS.map(dim=>allConcepts.filter(c=>c.dimId===dim.id).map(c=>(
                  <td key={c.name} style={{textAlign:"center",padding:"3px",borderBottom:"1px solid #1e293b"}}>
                    <div style={{width:"20px",height:"20px",background:C[cellSt(u.id,c.name)],borderRadius:"3px",margin:"auto",border:cellSt(u.id,c.name)==="empty"?"1px solid #334155":"none"}}/>
                  </td>
                )))}
              </tr>
            ))}
          </tbody>
        </table>
      </div>
    </div>
  );
}

// ── Charts Tab ────────────────────────────────────────────────────────
function ChartsTab({allUnits,allConcepts,raw,getE,dim4concept,analysisMode}){
  const modeColor=analysisMode==="chronicles"?"#93c5fd":"#fbbf24";
  const modeLabel=analysisMode==="chronicles"?'📘 דה"י':'📙 מקבילות';
  function Bar({val,max,color,label,val2,color2,label2}){
    const p=max?Math.round(val/max*100):0;
    const p2=max&&val2!=null?Math.round(val2/max*100):0;
    return(
      <div style={{marginBottom:"7px"}}>
        <div style={{display:"flex",justifyContent:"space-between",marginBottom:"2px"}}>
          <span style={{fontSize:"11px",color:"#94a3b8"}}>{label}</span>
          <span style={{fontSize:"11px",color:"#64748b"}}>{val}{val2!=null?` / ${val2}`:""}</span>
        </div>
        <div style={{background:"#0f172a",borderRadius:"4px",height:"9px",overflow:"hidden",display:"flex"}}>
          <div style={{width:p+"%",background:color,borderRadius:"4px",transition:"width 0.4s"}}/>
          {val2!=null&&<div style={{width:p2+"%",background:color2,transition:"width 0.4s"}}/>}
        </div>
      </div>
    );
  }
  const david=allUnits.filter(u=>u.character==="david"||!u.character);
  const solomon=allUnits.filter(u=>u.character==="solomon");
  return(
    <div style={{maxWidth:"800px",margin:"0 auto",padding:"20px 16px"}}>
      <div style={{...S.card,marginBottom:"16px"}}>
        <div style={{fontSize:"13px",fontWeight:"bold",color:modeColor,marginBottom:"8px"}}>מושגים לפי דמות — {modeLabel} <span style={{fontSize:"11px",color:"#64748b",fontWeight:"400"}}>■ כחול=דוד ■ סגול=שלמה</span></div>
        {DIMS.map(dim=>(
          <div key={dim.id} style={{marginBottom:"10px"}}>
            <div style={{fontSize:"10px",color:dim.color,fontWeight:"700",marginBottom:"5px"}}>{dim.label}</div>
            {allConcepts.filter(c=>c.dimId===dim.id).map(c=>{
              const d=david.filter(u=>{const e=getE(u.id,c.name,analysisMode);return e&&(e.explicit_note||(e.params||[]).some(p=>p.found===true));}).length;
              const s=solomon.filter(u=>{const e=getE(u.id,c.name,analysisMode);return e&&(e.explicit_note||(e.params||[]).some(p=>p.found===true));}).length;
              return <Bar key={c.name} label={c.name} val={d} val2={s} max={allUnits.length} color="#93c5fd" color2="#d8b4fe"/>;
            })}
          </div>
        ))}
      </div>
      <div style={S.card}>
        <div style={{fontSize:"13px",fontWeight:"bold",color:modeColor,marginBottom:"8px"}}>גלוי מול נרמז — {modeLabel} <span style={{fontSize:"11px",color:"#64748b",fontWeight:"400"}}>■ ירוק=גלוי ■ סגול=נרמז</span></div>
        {DIMS.map(dim=>(
          <div key={dim.id} style={{marginBottom:"10px"}}>
            <div style={{fontSize:"10px",color:dim.color,fontWeight:"700",marginBottom:"5px"}}>{dim.label}</div>
            {allConcepts.filter(c=>c.dimId===dim.id).map(c=>{
              const exp=allUnits.filter(u=>{const e=getE(u.id,c.name,analysisMode);return !!(e?.explicit_note?.trim());}).length;
              const imp=allUnits.filter(u=>{const e=getE(u.id,c.name,analysisMode);return (e?.params||[]).some(p=>p.found===true);}).length;
              return <Bar key={c.name} label={c.name} val={exp} val2={imp} max={allUnits.length} color="#34d399" color2="#818cf8"/>;
            })}
          </div>
        ))}
      </div>
    </div>
  );
}


// ── Compare Tab (סינתזה השוואתית) ────────────────────────────────────
// ── Compare Tab (סינתזה השוואתית) ────────────────────────────────────
function CompareTab({allUnits,allConcepts,getE,getParams,getCompareNote,setCompareNote}){
  const [selUnit,setSelUnit]=useState(null);
  const [selConcept,setSelConcept]=useState(null);
  const [aiLoading,setAiLoading]=useState(false);
  const [draftNote,setDraftNote]=useState("");
  const [savedFlash,setSavedFlash]=useState(false);

  const unit=allUnits.find(u=>u.id===selUnit);

  // טעינת מסקנה שמורה בכל פעם שמשתנה הבחירה (יחידה/מושג)
  React.useEffect(()=>{
    if(selUnit&&selConcept){ setDraftNote(getCompareNote(selUnit,selConcept)||""); }
    else { setDraftNote(""); }
  },[selUnit,selConcept]);

  function getChrEntry(uid,cname){ return getE(uid,cname,"chronicles"); }
  function getSrcEntry(uid,cname){ return getE(uid,cname,"source"); }

  async function runConceptSynthesis(){
    if(!unit||!selConcept)return;
    setAiLoading(true);
    const ec=getChrEntry(unit.id,selConcept)||{};
    const es=getSrcEntry(unit.id,selConcept)||{};
    const params=getParams(selConcept)||[];
    const validParams=params.filter(p=>p&&(typeof p==="object"?p.q:p).trim());

    function fmtParams(entry){
      if(!validParams.length)return"אין פרמטרים מוגדרים למושג זה.";
      return validParams.map((p,i)=>{
        const q=typeof p==="object"?p.q:p;
        const pe=(entry.params||[])[i]||{};
        const status=pe.found===true?"כן":pe.found===false?"לא":"לא נבדק";
        return `${i+1}. ${q} — ${status}${pe.verse?` (${pe.verse})`:""}${pe.note?`: ${pe.note}`:""}`;
      }).join("\n");
    }

    let diffSummary="אין הבדלים מסומנים";
    try{
      const diff=computeDiff(unit.chroniclesText||"",unit.sourceText||"");
      const added=[],omitted=[],changed=[];
      diff.forEach(ch=>{
        if(ch.type==="added"&&ch.aW?.length)added.push(ch.aW.join(" "));
        else if(ch.type==="omitted"&&ch.bW?.length)omitted.push(ch.bW.join(" "));
        else if(ch.type==="changed")changed.push(`"${(ch.bW||[]).join(" ")}" ← "${(ch.aW||[]).join(" ")}"`);
      });
      const parts=[];
      if(added.length)parts.push(`תוספות (${added.length}): ${added.join(", ")}`);
      if(omitted.length)parts.push(`השמטות (${omitted.length}): ${omitted.join(", ")}`);
      if(changed.length)parts.push(`שינויי מילים (${changed.length}): ${changed.join(", ")}`);
      if(parts.length)diffSummary=parts.join("\n");
    }catch{}

    const prompt=`אתה עוזר מחקר לתזה בתנ"ך, הבוחן את השפעת שינויי הכרוניסט על מושג ספציפי בהשוואה בין דברי הימים למקבילה.

מושג: "${selConcept}"
יחידה: ${unit.label} | דמות: ${unit.character==="solomon"?"שלמה":"דוד"} | מקביל: ${unit.sourceRef||"—"}

── ניתוח דברי הימים ──
גלוי: ${ec.explicit_note?.trim()||"לא נמצא"}
נרמז:
${fmtParams(ec)}

── ניתוח המקבילה (${unit.sourceRef||"שמואל/מלכים"}) ──
גלוי: ${es.explicit_note?.trim()||"לא נמצא"}
נרמז:
${fmtParams(es)}

── שינויים טקסטואליים שזוהו אוטומטית בין הטקסטים ──
${diffSummary}

── טקסט דברי הימים המלא ──
${unit.chroniclesText||"—"}

── טקסט המקביל המלא ──
${unit.sourceText||"—"}

── הערות פרשנים על היחידה (מכלי ההשוואה) ──
${unit.scholarship?.trim()||"אין הערות פרשנים שמורות ליחידה זו"}

הנחיות לכתיבת המסקנה (עברית אקדמית, כ-150-250 מילה):
1. קבעי האם המושג "${selConcept}" מופיע (גלוי ו/או נרמז) בדה"י, במקבילה, בשניהם, או באף אחד.
2. עברי במפורש על כל אחד מסוגי השינויים הרלוונטיים בין הטקסטים — השמטה, תוספת, שינוי מילים, ושינוי בסדר המילים (יש לבדוק שינוי סדר גם אם אינו מסומן ברשימת השינויים האוטומטית לעיל — הסתמכי על קריאה ישירה של שני הטקסטים המלאים) — וקבעי לגבי כל שינוי רלוונטי האם והיאך הוא משפיע על נוכחות או משמעות המושג.
3. הביאי דוגמאות קונקרטיות (מילים ומספרי פסוקים) מתוך הטקסטים לכל קביעה.
4. השתמשי בהערות הפרשנים לעיל כדי לבסס או להעמיק את הניתוח, וציטטי אותם בקצרה במידת הצורך.
5. סיימי במסקנה מסכמת אחת: האם שינויי הכרוניסט חיזקו, החלישו, או לא שינו את ביטוי המושג ביחידה זו.`;

    try{
      const res=await fetch("https://anthropic-proxy.anna-sho-ea8.workers.dev",{method:"POST",headers:{"Content-Type":"application/json"},
        body:JSON.stringify({model:"claude-sonnet-4-6",max_tokens:1200,messages:[{role:"user",content:prompt}]})});
      const data=await res.json();
      if(!data.content||!data.content.length){
        setDraftNote("⚠️ שגיאת AI: "+aiErrorText(data));
      }else{
        setDraftNote(data.content.map(b=>b.text||"").join(""));
      }
    }catch(err){setDraftNote("⚠️ שגיאת חיבור: "+err.message);}
    setAiLoading(false);
  }

  function saveNote(){
    if(!selUnit||!selConcept)return;
    setCompareNote(selUnit,selConcept,draftNote);
    setSavedFlash(true);
    setTimeout(()=>setSavedFlash(false),2000);
  }

  function renderEntryColumn(label,color,entry,validParams){
    return(
      <div style={{background:"#1e293b",borderRadius:"8px",padding:"12px",border:`1px solid ${color}33`}}>
        <div style={{fontSize:"12px",fontWeight:"700",color,marginBottom:"8px"}}>{label}</div>
        <div style={{marginBottom:"10px"}}>
          <div style={{fontSize:"10px",color:"#64748b",fontWeight:"700",marginBottom:"3px"}}>📗 גלוי</div>
          <div style={{fontSize:"12px",color:"#e2e8f0",lineHeight:"1.6",background:"#0f172a",borderRadius:"5px",padding:"6px 8px",whiteSpace:"pre-wrap"}}>
            {entry?.explicit_note?.trim()||"—"}
          </div>
        </div>
        <div>
          <div style={{fontSize:"10px",color:"#64748b",fontWeight:"700",marginBottom:"3px"}}>📘 נרמז</div>
          {validParams.length===0?(
            <div style={{fontSize:"11px",color:"#475569"}}>אין פרמטרים מוגדרים</div>
          ):(
            validParams.map((p,i)=>{
              const q=typeof p==="object"?p.q:p;
              const pe=(entry?.params||[])[i]||{};
              return(
                <div key={i} style={{background:"#0f172a",borderRadius:"5px",padding:"6px 8px",marginBottom:"4px"}}>
                  <div style={{fontSize:"11px",color:"#94a3b8",marginBottom:"2px",lineHeight:"1.5"}}>{i+1}. {q}</div>
                  <div style={{fontSize:"11px",fontWeight:"700",color:pe.found===true?color:pe.found===false?"#64748b":"#475569"}}>
                    {pe.found===true?"כן ✓":pe.found===false?"לא ✗":"לא נבדק"} {pe.verse&&pe.verse}
                  </div>
                  {pe.note&&<div style={{fontSize:"10px",color:"#94a3b8",lineHeight:"1.5",fontStyle:"italic"}}>{pe.note}</div>}
                </div>
              );
            })
          )}
        </div>
      </div>
    );
  }

  const davidUnits=allUnits.filter(u=>u.character==="david"||!u.character);
  const solomonUnits=allUnits.filter(u=>u.character==="solomon");

  return(
    <div style={{display:"grid",gridTemplateColumns:"200px 1fr 200px",height:"calc(100vh - 46px)"}}>
      {/* ── עמודת יחידות (ימין) ── */}
      <div style={{background:"#1e293b",borderLeft:"1px solid #334155",overflowY:"auto",padding:"10px"}}>
        <div style={{fontSize:"11px",fontWeight:"700",color:"#34d399",marginBottom:"8px"}}>🔍 בחרי יחידה</div>
        {[["דוד","david","#93c5fd",davidUnits],["שלמה","solomon","#d8b4fe",solomonUnits]].map(([name,ch,color,us])=>(
          <div key={ch} style={{marginBottom:"10px"}}>
            <div style={{fontSize:"10px",color,fontWeight:"700",marginBottom:"4px"}}>👑 {name}</div>
            {us.map(u=>(
              <button key={u.id} onClick={()=>setSelUnit(u.id)}
                style={{display:"block",width:"100%",textAlign:"right",padding:"6px 8px",borderRadius:"6px",border:"none",cursor:"pointer",marginBottom:"2px",fontSize:"11px",
                  background:selUnit===u.id?"#334155":"transparent",color:selUnit===u.id?"#f1f5f9":"#64748b",
                  borderRight:selUnit===u.id?"3px solid #34d399":"3px solid transparent"}}>
                {u.label}
              </button>
            ))}
          </div>
        ))}

      {/* ── עמודת מושגים (שמאל) ── */}

}

// ── Synthesis Tab ─────────────────────────────────────────────────────
const SYNTH_KEY="chronicles_synthesis_v1";
const SLS={
  load(){ try{const r=localStorage.getItem(SYNTH_KEY);return r?JSON.parse(r):{};}catch{return{};} },
  save(d){ try{localStorage.setItem(SYNTH_KEY,JSON.stringify(d));}catch{} }
};

function SynthesisTab({allUnits,allConcepts,getE,analysisMode}){
  const [mode,setMode]=React.useState("unit");
  const [selUnit,setSelUnit]=React.useState(null);
  const [selDim,setSelDim]=React.useState("d1");
  const [aiLoading,setAiLoading]=React.useState(false);
  const [aiResult,setAiResult]=React.useState("");
  const [editText,setEditText]=React.useState("");
  const [scholars,setScholars]=React.useState("");
  const [saved,setSaved]=React.useState(()=>SLS.load());
  const [showSaved,setShowSaved]=React.useState(false);
  const [saveMsg,setSaveMsg]=React.useState("");

  function flash(m){setSaveMsg(m);setTimeout(()=>setSaveMsg(""),2500);}

  function buildDiffSummary(u){
    try{
      const diff=computeDiff(u.chroniclesText||"",u.sourceText||"");
      const added=[],omitted=[],changed=[];
      diff.forEach(ch=>{
        if(ch.type==="added"&&ch.aW&&ch.aW.length)added.push(ch.aW.join(" "));
        else if(ch.type==="omitted"&&ch.bW&&ch.bW.length)omitted.push(ch.bW.join(" "));
        else if(ch.type==="changed"){const w=(ch.aW||[]).join(" ");if(w)changed.push(w);}
      });
      const parts=[];
      if(added.length)parts.push("תוספות ("+added.length+"): "+added.join(", "));
      if(omitted.length)parts.push("השמטות ("+omitted.length+"): "+omitted.join(", "));
      if(changed.length)parts.push("שינויים ("+changed.length+"): "+changed.join(", "));
      return parts.join(" | ")||"אין הבדלים מסומנים";
    }catch{return"—";}
  }

  function buildAnalysisSummary(uid){
    const lines=[];
    DIMS.forEach(dim=>{
      const found=[];
      allConcepts.filter(c=>c.dimId===dim.id).forEach(c=>{
        const e=getE(uid,c.name,analysisMode);
        if(!e)return;
        const hasExp=!!(e.explicit_note&&e.explicit_note.trim());
        const implCount=(e.params||[]).filter(p=>p.found===true).length;
        const implVerses=(e.params||[]).filter(p=>p.found===true&&p.verse).map(p=>p.verse).join(", ");
        if(hasExp||implCount>0){
          let entry=c.name;
          if(hasExp)entry+=" [גלוי: "+(e.explicit_note.substring(0,100))+(e.explicit_note.length>100?"...":"")+"]";
          if(implCount>0)entry+=" [נרמז: "+implCount+" פרמטרים"+(implVerses?" — פסוקים: "+implVerses:"")+"]";
          found.push(entry);
        }
      });
      if(found.length)lines.push(dim.label+":\n"+found.map(f=>"  • "+f).join("\n"));
    });
    return lines.join("\n\n")||"טרם בוצע ניתוח ליחידה זו";
  }

  async function runUnitSynthesis(){
    if(!selUnit)return;
    const u=allUnits.find(u=>u.id===selUnit);
    if(!u)return;
    setAiLoading(true);setAiResult("");setEditText("");
    const diffSummary=buildDiffSummary(u);
    const analysisSummary=buildAnalysisSummary(u.id);
    const prompt=`אתה עוזר מחקר לתזת דוקטורט בתנ"ך. עליך לכתוב פסקה אקדמית מוכנה לתזה.

הנושא: עיצוב דמויותיהם של דוד ושלמה בספר דברי הימים לאור חזון המלך האידיאלי בישעיהו, ירמיהו ויחזקאל.

יחידה ספרותית: ${u.label}
דמות: ${u.character==="david"?"דוד":u.character==="solomon"?"שלמה":"—"}
מקביל: ${u.sourceRef||"—"}

טקסט דברי הימים:
${u.chroniclesText||"—"}

טקסט מקביל:
${u.sourceText||"—"}

שינויים שעשה הכרוניסט:
${diffSummary}

ממצאי הניתוח לפי ממדים:
${analysisSummary}

הנחיות:
• כתוב פסקה אקדמית אחת בעברית (כ-150-200 מילה)
• התמקד בממצאים הבולטים ביותר
• קשר בין שינויי הכרוניסט לממדים הנבואיים
• ניסוח אקדמי מדויק, ללא כותרת
• סמן [ביסוס נדרש] במקומות הדורשים ציטוט חוקרים`;
    try{
      const res=await fetch("https://anthropic-proxy.anna-sho-ea8.workers.dev",{method:"POST",headers:{"Content-Type":"application/json"},
        body:JSON.stringify({model:"claude-sonnet-4-6",max_tokens:1000,messages:[{role:"user",content:prompt}]})});
      const data=await res.json();
      if(!data.content||!data.content.length){
        setAiResult("⚠️ שגיאת AI: "+aiErrorText(data));setEditText("");
      }else{
        const text=data.content.map(b=>b.text||"").join("");
        setAiResult(text);setEditText(text);
      }
    }catch(err){setAiResult("⚠️ שגיאת חיבור: "+err.message);}
    setAiLoading(false);
  }

  async function runDimSynthesis(){
    const dim=DIMS.find(d=>d.id===selDim);
    if(!dim)return;
    setAiLoading(true);setAiResult("");setEditText("");
    const concepts=allConcepts.filter(c=>c.dimId===selDim);
    const davidUnits=allUnits.filter(u=>u.character==="david"||!u.character);
    const solomonUnits=allUnits.filter(u=>u.character==="solomon");
    const statsText=concepts.map(c=>{
      const dFound=davidUnits.filter(u=>{const e=getE(u.id,c.name,analysisMode);return e&&(e.explicit_note&&e.explicit_note.trim()||(e.params||[]).some(p=>p.found===true));});
      const sFound=solomonUnits.filter(u=>{const e=getE(u.id,c.name,analysisMode);return e&&(e.explicit_note&&e.explicit_note.trim()||(e.params||[]).some(p=>p.found===true));});
      const examples=[];
      [...dFound,...sFound].slice(0,3).forEach(u=>{
        const e=getE(u.id,c.name);
        if(e&&e.explicit_note&&e.explicit_note.trim())examples.push(u.label+" (גלוי): "+e.explicit_note.substring(0,80));
        const iv=(e&&e.params||[]).filter(p=>p.found===true&&p.verse).map(p=>p.verse).join(", ");
        if(iv)examples.push(u.label+" (נרמז — פסוק: "+iv+")");
      });
      return "\nמושג: "+c.name+"\n  דוד: "+dFound.length+"/"+davidUnits.length+" | שלמה: "+sFound.length+"/"+solomonUnits.length+"\n  דוגמאות: "+(examples.length?examples.join("; "):"אין עדיין");
    }).join("\n");
    const prompt=`אתה עוזר מחקר לתזת דוקטורט בתנ"ך. עליך לכתוב ניתוח אקדמי מוכן לתזה.

הנושא: עיצוב דמויותיהם של דוד ושלמה בספר דברי הימים לאור חזון המלך האידיאלי.

ממד: ${dim.label}
מושגים: ${concepts.map(c=>c.name).join(", ")}

נתונים וממצאים:
${statsText}

סה"כ יחידות: ${allUnits.length} (דוד: ${davidUnits.length} | שלמה: ${solomonUnits.length})

הנחיות:
• שתי פסקאות אקדמיות בעברית (כ-250-300 מילה סה"כ)
• פסקה א: ממצאים בדוד — מושגים בולטים, תדירות, דפוסים
• פסקה ב: ממצאים בשלמה + השוואה לדוד
• ציין מספרים: "המושג X מופיע ב-Y מתוך Z יחידות"
• קשר לחזון הנבואי
• [ביסוס נדרש] בנקודות הדורשות ציטוט
• ללא כותרות`;
    try{
      const res=await fetch("https://anthropic-proxy.anna-sho-ea8.workers.dev",{method:"POST",headers:{"Content-Type":"application/json"},
        body:JSON.stringify({model:"claude-sonnet-4-6",max_tokens:1200,messages:[{role:"user",content:prompt}]})});
      const data=await res.json();
      if(!data.content||!data.content.length){
        setAiResult("⚠️ שגיאת AI: "+aiErrorText(data));setEditText("");
      }else{
        const text=data.content.map(b=>b.text||"").join("");
        setAiResult(text);setEditText(text);
      }
    }catch(err){setAiResult("⚠️ שגיאת חיבור: "+err.message);}
    setAiLoading(false);
  }

  function saveSynthesis(){
    const key=mode==="unit"?"unit_"+selUnit:"dim_"+selDim;
    const label=mode==="unit"?(allUnits.find(u=>u.id===selUnit)||{label:"יחידה"}).label:(DIMS.find(d=>d.id===selDim)||{label:"ממד"}).label;
    const entry={key,label,mode,text:editText,scholars,savedAt:new Date().toLocaleDateString("he-IL")};
    const updated=Object.assign({},saved);updated[key]=entry;
    setSaved(updated);SLS.save(updated);flash("✓ נשמר");
  }

  function loadSaved(key){
    const entry=saved[key];
    if(!entry)return;
    setEditText(entry.text||"");setScholars(entry.scholars||"");setAiResult(entry.text||"");
    if(entry.mode==="unit"){setMode("unit");setSelUnit(Number(entry.key.replace("unit_","")));}
    else{setMode("dim");setSelDim(entry.key.replace("dim_",""));}
  }

  const davidUnits=allUnits.filter(u=>u.character==="david"||!u.character);
  const solomonUnits=allUnits.filter(u=>u.character==="solomon");

  return(
    <div style={{maxWidth:"900px",margin:"0 auto",padding:"20px 16px"}}>
      <div style={{background:"#1e293b",border:"1px solid #334155",borderRadius:"10px",padding:"14px",marginBottom:"16px",background:"linear-gradient(135deg,#1e293b,#0f172a)"}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",flexWrap:"wrap",gap:"10px"}}>
          <div>
            <div style={{fontSize:"16px",fontWeight:"bold",color:"#f1f5f9"}}>✍️ סינתזה — טקסט מוכן לתזה</div>
            <div style={{fontSize:"12px",color:"#64748b",marginTop:"3px"}}>שלב ג׳: ניתוח AI → שלב ד׳: עריכה + הוספת מחקרים</div>
          </div>
          <button onClick={()=>setShowSaved(s=>!s)}
            style={{padding:"6px 14px",borderRadius:"14px",border:"1px solid #334155",cursor:"pointer",fontSize:"12px",background:"#334155",color:"#94a3b8"}}>
            {showSaved?"▲ סגור":"📁 טיוטות ("+(Object.keys(saved).length)+")"}
          </button>
        </div>

            <div style={{fontSize:"12px",color:"#475569"}}>אין טיוטות עדיין</div>

            <div style={{display:"grid",gap:"6px"}}>

                    <span style={{fontSize:"11px",color:"#475569",marginRight:"8px"}}> — {entry.savedAt}</span>
                  </div>
                  <div style={{display:"flex",gap:"6px"}}>
                    <button onClick={()=>loadSaved(entry.key)} style={{padding:"3px 10px",borderRadius:"10px",border:"none",cursor:"pointer",fontSize:"11px",background:"#818cf8",color:"white"}}>טען</button>
                    <button onClick={()=>{const u=Object.assign({},saved);delete u[entry.key];setSaved(u);SLS.save(u);}} style={{padding:"3px 10px",borderRadius:"10px",border:"none",cursor:"pointer",fontSize:"11px",background:"#334155",color:"#94a3b8"}}>מחק</button>
                  </div>
                </div>
              ))}
            </div>
          )}
        </div>
      )}

      <div style={{display:"flex",gap:"8px",marginBottom:"16px"}}>
        {[["unit","📄 לפי יחידה"],["dim","📊 לפי ממד"]].map(([v,l])=>(
          <button key={v} onClick={()=>{setMode(v);setAiResult("");setEditText("");setScholars("");}}
            style={{padding:"8px 18px",borderRadius:"20px",border:"none",cursor:"pointer",fontSize:"13px",fontWeight:"600",
              background:mode===v?"#818cf8":"#1e293b",color:mode===v?"white":"#64748b"}}>
            {l}
          </button>
        ))}
      </div>

      {mode==="unit"&&(
        <div style={{background:"#1e293b",border:"1px solid #334155",borderRadius:"10px",padding:"14px",marginBottom:"16px"}}>
          <div style={{fontSize:"13px",fontWeight:"700",color:"#f1f5f9",marginBottom:"12px"}}>בחרי יחידה</div>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"12px",marginBottom:"12px"}}>
            {[["דוד","david","#93c5fd",davidUnits],["שלמה","solomon","#d8b4fe",solomonUnits]].map(([name,char,color,units])=>(
              <div key={char}>
                <div style={{fontSize:"11px",color:color,fontWeight:"700",marginBottom:"6px"}}>👑 {name} ({units.length})</div>
                <div style={{maxHeight:"200px",overflowY:"auto",display:"grid",gap:"3px"}}>
                  {units.map(u=>(
                    <button key={u.id} onClick={()=>{setSelUnit(u.id);setAiResult("");setEditText("");setScholars("");}}
                      style={{padding:"5px 8px",borderRadius:"6px",border:"1px solid "+(selUnit===u.id?color:"#334155"),cursor:"pointer",textAlign:"right",
                        background:selUnit===u.id?"#1e3a5f":"#0f172a",color:selUnit===u.id?"#e2e8f0":"#94a3b8",fontSize:"11px",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                      <span>{u.label}</span>
                      {saved["unit_"+u.id]&&<span style={{fontSize:"9px",color:"#34d399"}}>✓</span>}
                    </button>
                  ))}
                </div>
              </div>
            ))}
          </div>
          {selUnit&&(
            <button onClick={runUnitSynthesis} disabled={aiLoading}
              style={{width:"100%",padding:"10px",borderRadius:"8px",border:"none",cursor:aiLoading?"wait":"pointer",
                background:aiLoading?"#1e293b":"#7c3aed",color:aiLoading?"#475569":"white",fontSize:"13px",fontWeight:"700"}}>
              {aiLoading?"⏳ מייצר...":"🤖 צור סינתזה ליחידה זו"}
            </button>
          )}
        </div>
      )}

      {mode==="dim"&&(
        <div style={{background:"#1e293b",border:"1px solid #334155",borderRadius:"10px",padding:"14px",marginBottom:"16px"}}>
          <div style={{fontSize:"13px",fontWeight:"700",color:"#f1f5f9",marginBottom:"10px"}}>בחרי ממד נבואי</div>
          <div style={{display:"grid",gap:"6px",marginBottom:"12px"}}>
            {DIMS.map(dim=>{
              const concepts=allConcepts.filter(c=>c.dimId===dim.id);
              const totalFound=allUnits.filter(u=>concepts.some(c=>{const e=getE(u.id,c.name);return e&&(e.explicit_note&&e.explicit_note.trim()||(e.params||[]).some(p=>p.found===true));})).length;
              return(
                <button key={dim.id} onClick={()=>{setSelDim(dim.id);setAiResult("");setEditText("");setScholars("");}}
                  style={{padding:"10px 14px",borderRadius:"8px",border:"2px solid "+(selDim===dim.id?dim.color:"#334155"),cursor:"pointer",textAlign:"right",
                    background:selDim===dim.id?"#1e293b":"#0f172a",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                  <div>
                    <span style={{fontSize:"13px",fontWeight:"700",color:dim.color}}>{dim.label}</span>
                    <span style={{fontSize:"11px",color:"#475569",marginRight:"8px"}}> | {concepts.map(c=>c.name).join(", ")}</span>
                  </div>
                  <div style={{display:"flex",alignItems:"center",gap:"8px"}}>
                    <span style={{fontSize:"11px",color:"#64748b"}}>{totalFound}/{allUnits.length}</span>
                    {saved["dim_"+dim.id]&&<span style={{fontSize:"11px",color:"#34d399"}}>✓</span>}
                  </div>
                </button>
              );
            })}
          </div>
          <button onClick={runDimSynthesis} disabled={aiLoading}
            style={{width:"100%",padding:"10px",borderRadius:"8px",border:"none",cursor:aiLoading?"wait":"pointer",
              background:aiLoading?"#1e293b":"#7c3aed",color:aiLoading?"#475569":"white",fontSize:"13px",fontWeight:"700"}}>
            {aiLoading?"⏳ מנתח...":"🤖 צור ניתוח לממד"}
          </button>
        </div>
      )}

      {(aiResult||editText)?(
        <div style={{background:"#1e293b",border:"1px solid #334155",borderRadius:"10px",padding:"14px",marginBottom:"16px"}}>
          <div style={{display:"flex",gap:"8px",marginBottom:"12px",flexWrap:"wrap"}}>
            <span style={{background:"#7c3aed22",border:"1px solid #7c3aed44",color:"#a78bfa",padding:"2px 10px",borderRadius:"12px",fontSize:"11px",fontWeight:"700"}}>שלב ג׳: טקסט AI</span>
            <span style={{background:"#05996022",border:"1px solid #05996044",color:"#34d399",padding:"2px 10px",borderRadius:"12px",fontSize:"11px",fontWeight:"700"}}>שלב ד׳: עריכה + מחקרים</span>
          </div>
          <label style={{display:"block",fontSize:"11px",fontWeight:"700",color:"#a5b4fc",marginBottom:"4px",textTransform:"uppercase"}}>עריכת הטקסט</label>
          <textarea value={editText} onChange={e=>setEditText(e.target.value)} rows={10}
            style={{width:"100%",background:"#0f172a",border:"1px solid #334155",borderRadius:"6px",padding:"7px 10px",fontSize:"14px",color:"#e2e8f0",outline:"none",boxSizing:"border-box",resize:"vertical",lineHeight:"1.9",direction:"rtl",marginBottom:"12px",fontFamily:"inherit"}}/>
          <label style={{display:"block",fontSize:"11px",fontWeight:"700",color:"#34d399",marginBottom:"4px",textTransform:"uppercase"}}>📚 הוספת מחקרים וציטוטים</label>
          <textarea value={scholars} onChange={e=>setScholars(e.target.value)} rows={4}
            style={{width:"100%",background:"#0f172a",border:"1px solid #065f46",borderRadius:"6px",padding:"7px 10px",fontSize:"13px",color:"#e2e8f0",outline:"none",boxSizing:"border-box",resize:"vertical",lineHeight:"1.8",direction:"rtl",marginBottom:"12px",fontFamily:"inherit"}}
            placeholder={"לדוגמה:\n• Japhet 2009, עמ' 365 — על האידיאליזציה של דוד\n• Knoppers 2004, עמ' 132 — על כל ישראל\n• [ביסוס נדרש] — הוסיפי את הציטוט"}/>
          {scholars.trim()&&(
            <div style={{marginBottom:"12px"}}>
              <div style={{fontSize:"11px",color:"#34d399",fontWeight:"700",marginBottom:"6px"}}>📋 טקסט מלא (מוכן להעתקה)</div>
              <div style={{background:"#022c22",border:"1px solid #065f46",borderRadius:"7px",padding:"12px 14px",fontSize:"13px",color:"#d1fae5",lineHeight:"2",whiteSpace:"pre-wrap",direction:"rtl",fontFamily:"inherit"}}>
                {editText+`\n\n`+scholars}
              </div>
            </div>
          )}
          <div style={{display:"flex",gap:"8px",alignItems:"center",flexWrap:"wrap"}}>
            <button onClick={saveSynthesis} style={{padding:"8px 20px",borderRadius:"8px",border:"none",cursor:"pointer",background:"#16a34a",color:"white",fontSize:"13px",fontWeight:"700"}}>💾 שמור</button>
            <button onClick={()=>{
              const text=scholars.trim()?editText+"\n\n"+scholars:editText;
              if(navigator.clipboard&&navigator.clipboard.writeText){navigator.clipboard.writeText(text).then(()=>flash("✓ הועתק")).catch(()=>flash("לא ניתן להעתיק"));}
              else flash("לא ניתן להעתיק");
            }} style={{padding:"8px 20px",borderRadius:"8px",border:"1px solid #334155",cursor:"pointer",background:"#1e293b",color:"#94a3b8",fontSize:"13px",fontWeight:"700"}}>📋 העתק</button>
            <button onClick={()=>{setAiResult("");setEditText("");setScholars("");}} style={{padding:"8px 14px",borderRadius:"8px",border:"1px solid #334155",cursor:"pointer",background:"transparent",color:"#64748b",fontSize:"12px"}}>נקה</button>
            {saveMsg&&<span style={{color:"#34d399",fontSize:"12px",fontWeight:"700"}}>{saveMsg}</span>}
          </div>
        </div>
      ):(
        <div style={{textAlign:"center",padding:"40px 0",color:"#334155"}}>
          <div style={{fontSize:"40px",marginBottom:"12px"}}>✍️</div>
          <div style={{fontSize:"14px",color:"#475569"}}>בחרי יחידה או ממד ולחצי על "צור סינתזה"</div>
          <div style={{fontSize:"12px",color:"#334155",marginTop:"6px"}}>הטקסט יהיה מוכן לעריכה ולהוספת מחקרים</div>
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script></body></html>
